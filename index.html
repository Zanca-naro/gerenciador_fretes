    else if (k === '3m') iniD = new Date(hoje.getFullYear(), hoje.getMonth() - 2, 1);
    else if (k === '6m') iniD = new Date(hoje.getFullYear(), hoje.getMonth() - 5, 1);
    else iniD = new Date(hoje.getFullYear(), 0, 1);
    analisePeriodo.ini = iniD.toISOString().slice(0, 10);
    analisePeriodo.fim = todayISO();
    renderAnaliseFinanceira();
  }));
}


/* Config de capital de giro (saldo inicial em caixa) */
function getSaldoInicial() {
  const v = parseFloat(localStorage.getItem('frota_saldo_inicial'));
  return isNaN(v) ? 0 : v;
}
function setSaldoInicial(v) {
  localStorage.setItem('frota_saldo_inicial', String(Number(v) || 0));
}
let fluxoModo = 'mensal'; // 'mensal' ou 'diario'

function renderFluxoCaixa() {
  const vendas = Store.list('sales');
  const lancamentos = Store.list('finance');
  const hoje = todayISO();
  const mesAtual = hoje.slice(0, 7);

  // Recebíveis: parcelas pendentes de fretes fechados/concluídos + receitas manuais pendentes
  const recebiveis = [];
  vendas.filter(s => s.status === 'fechado' || s.status === 'concluido').forEach(s => {
    const parcelas = getParcelas(s);
    parcelas.filter(p => p.pago === 'nao').forEach(p => {
      recebiveis.push({
        origem: 'venda', saleId: s.id, num: p.num, totalParcelas: parcelas.length,
        cliente: s.cliente, detalhe: `${s.origem ? s.origem + ' → ' : ''}${s.destino}`,
        forma: s.forma_pgto || '—', data: p.data, valor: p.valor, dias: diasAte(p.data)
      });
    });
  });
  lancamentos.filter(l => l.tipo === 'receita' && l.pago === 'nao').forEach(l => {
    recebiveis.push({
      origem: 'finance', finId: l.id, num: 1, totalParcelas: 1,
      cliente: l.descricao, detalhe: l.categoria || '', forma: '—',
      data: l.data, valor: Number(l.valor), dias: diasAte(l.data)
    });
  });
  recebiveis.sort((a, b) => (a.data || '').localeCompare(b.data || ''));

  // Pagáveis: despesas manuais pendentes + compras a prazo (combustível/manutenção)
  const pagaveis = lancamentos.filter(l => l.tipo === 'despesa' && l.pago === 'nao')
    .map(l => ({ src: 'finance', srcId: l.id, data: l.data, valor: Number(l.valor), descricao: l.descricao, categoria: l.categoria || '', dias: diasAte(l.data) }));
  Store.list('fuel').filter(f => f.pago === 'nao').forEach(f => {
    const venc = f.vencimento || f.data;
    pagaveis.push({ src: 'fuel', srcId: f.id, data: venc, valor: Number(f.valor_total), descricao: `Combustível ${(Store.get('vehicles', f.vehicle_id) || {}).placa || ''} (${f.litros} L)`, categoria: 'Combustível', dias: diasAte(venc) });
  });
  Store.list('maintenance').filter(m => m.pago === 'nao' && Number(m.custo) > 0).forEach(m => {
    const venc = m.vencimento || m.data;
    pagaveis.push({ src: 'maintenance', srcId: m.id, data: venc, valor: Number(m.custo), descricao: `${m.descricao} — ${(Store.get('vehicles', m.vehicle_id) || {}).placa || ''}`, categoria: 'Manutenção', dias: diasAte(venc) });
  });
  pagaveis.sort((a, b) => (a.data || '').localeCompare(b.data || ''));

  const vencidos = recebiveis.filter(r => r.dias !== null && r.dias < 0);
  const totalVencido = vencidos.reduce((s, r) => s + r.valor, 0);
  const totalReceber = recebiveis.reduce((s, r) => s + r.valor, 0);
  const receber30 = recebiveis.filter(r => r.dias !== null && r.dias >= 0 && r.dias <= 30).reduce((s, r) => s + r.valor, 0);
  const totalPagar = pagaveis.reduce((s, l) => s + Number(l.valor), 0);

  // Projeção: mês atual + 5 seguintes (+ linha de atrasados)
  const saldoInicial = getSaldoInicial();
  const [cy, cm] = mesAtual.split('-').map(Number);
  const meses = [];
  for (let i = 0; i < 6; i++) {
    const dt = new Date(cy, cm - 1 + i, 1);
    meses.push(`${dt.getFullYear()}-${String(dt.getMonth() + 1).padStart(2, '0')}`);
  }
  let acumulado = saldoInicial;
  let menorSaldo = saldoInicial; // pior momento do caixa (para alerta de ruptura)
  let dataMenorSaldo = 'hoje';
  const entradasAtraso = vencidos.reduce((s, r) => s + r.valor, 0);
  const saidasAtraso = pagaveis.filter(l => l.dias !== null && l.dias < 0).reduce((s, l) => s + Number(l.valor), 0);
  const projRows = [];
  // linha do saldo inicial
  projRows.push(`<tr style="background:#F7F8F9;">
    <td><strong>Saldo hoje</strong></td>
    <td>—</td><td>—</td><td>—</td>
    <td style="font-weight:600;color:${saldoInicial >= 0 ? 'var(--verde-ok)' : 'var(--vermelho-alerta)'};">${fmtMoney(saldoInicial)}</td>
  </tr>`);
  if (entradasAtraso > 0 || saidasAtraso > 0) {
    acumulado += entradasAtraso - saidasAtraso;
    if (acumulado < menorSaldo) { menorSaldo = acumulado; dataMenorSaldo = 'itens em atraso'; }
    projRows.push(`<tr>
      <td><strong style="color:var(--vermelho-alerta);">Em atraso</strong></td>
      <td style="color:var(--verde-ok);">${fmtMoney(entradasAtraso)}</td>
      <td style="color:var(--vermelho-alerta);">${fmtMoney(saidasAtraso)}</td>
      <td style="font-weight:600;">${fmtMoney(entradasAtraso - saidasAtraso)}</td>
      <td style="font-weight:600;color:${acumulado >= 0 ? 'var(--verde-ok)' : 'var(--vermelho-alerta)'};">${fmtMoney(acumulado)}</td>
    </tr>`);
  }
  meses.forEach(m2 => {
    const entradas = recebiveis.filter(r => r.data && r.data.slice(0, 7) === m2 && r.dias >= 0).reduce((s, r) => s + r.valor, 0);
    const saidas = pagaveis.filter(l => l.data && l.data.slice(0, 7) === m2 && l.dias >= 0).reduce((s, l) => s + Number(l.valor), 0);
    const saldoMes = entradas - saidas;
    acumulado += saldoMes;
    if (acumulado < menorSaldo) { menorSaldo = acumulado; dataMenorSaldo = mesLabel(m2); }
    projRows.push(`<tr>
      <td style="text-transform:capitalize;">${mesLabel(m2)}</td>
      <td style="color:var(--verde-ok);">${entradas ? fmtMoney(entradas) : '—'}</td>
      <td style="color:var(--vermelho-alerta);">${saidas ? fmtMoney(saidas) : '—'}</td>
      <td style="font-weight:600;">${entradas || saidas ? fmtMoney(saldoMes) : '—'}</td>
      <td style="font-weight:600;color:${acumulado >= 0 ? 'var(--verde-ok)' : 'var(--vermelho-alerta)'};">${fmtMoney(acumulado)}</td>
    </tr>`);
  });
  const saudeFinal = saldoInicial + totalReceber - totalPagar; // caixa após TODAS as movimentações previstas (sem limite de meses)

  // se houver movimentos além do horizonte de 6 meses, mostra uma linha de fechamento
  const limiteHorizonte = meses[meses.length - 1];
  const recFora = recebiveis.filter(r => r.data && r.data.slice(0, 7) > limiteHorizonte && r.dias >= 0).reduce((s, r) => s + r.valor, 0);
  const pagFora = pagaveis.filter(l => l.data && l.data.slice(0, 7) > limiteHorizonte && l.dias >= 0).reduce((s, l) => s + Number(l.valor), 0);
  if (recFora > 0 || pagFora > 0) {
    acumulado += (recFora - pagFora);
    projRows.push(`<tr style="background:#F7F8F9;">
      <td><strong>Após 6 meses</strong></td>
      <td style="color:var(--verde-ok);">${recFora ? fmtMoney(recFora) : '—'}</td>
      <td style="color:var(--vermelho-alerta);">${pagFora ? fmtMoney(pagFora) : '—'}</td>
      <td style="font-weight:600;">${fmtMoney(recFora - pagFora)}</td>
      <td style="font-weight:700;color:${acumulado >= 0 ? 'var(--verde-ok)' : 'var(--vermelho-alerta)'};">${fmtMoney(acumulado)}</td>
    </tr>`);
  }

  // ----- Projeção DIÁRIA (para evitar ruptura no meio do mês) -----
  // junta todos os movimentos futuros (a partir de hoje) por dia, incluindo atrasados no primeiro dia
  const movDiarios = {};
  const addMov = (data, valor) => {
    let d = data;
    if (!d || d < hoje) d = hoje; // atrasados e sem data caem em hoje
    movDiarios[d] = (movDiarios[d] || 0) + valor;
  };
  recebiveis.forEach(r => addMov(r.data, r.valor));
  pagaveis.forEach(l => addMov(l.data, -Number(l.valor)));
  const diasOrdenados = Object.keys(movDiarios).sort();
  let acumDia = saldoInicial;

async function hashSenha(senha, salt) {
  const text = salt + '|' + senha;
  try {
    if (window.crypto && crypto.subtle) {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
    }
  } catch (e) { /* fallback abaixo */ }
  let h1 = 0xdeadbeef, h2 = 0x41c6ce57;
  for (let i = 0; i < text.length; i++) {
    const ch = text.charCodeAt(i);
    h1 = Math.imul(h1 ^ ch, 2654435761);
    h2 = Math.imul(h2 ^ ch, 1597334677);
  }
  h1 = Math.imul(h1 ^ (h1 >>> 16), 2246822507) ^ Math.imul(h2 ^ (h2 >>> 13), 3266489909);
  h2 = Math.imul(h2 ^ (h2 >>> 16), 2246822507) ^ Math.imul(h1 ^ (h1 >>> 13), 3266489909);
  return 'f' + (h2 >>> 0).toString(16) + (h1 >>> 0).toString(16);
}

function gerarSalt() {
  return Math.random().toString(36).slice(2) + Date.now().toString(36);
}

function sessaoAtual() {
  try { return JSON.parse(sessionStorage.getItem('frota_sessao')); } catch (e) { return null; }
}

function temPermissao(view) {
  const s = sessaoAtual();
  if (!s) return false;
  if (s.admin) return true;
  if (view === 'users') return false;
  const perms = s.permissoes || [];
  if (view === 'purchases' && (perms.includes('fuel') || perms.includes('maintenance'))) return true;
  if (view === 'finance' && perms.includes('cashflow')) return true;
  return perms.includes(view);
}

function montarNavPorPermissao() {
  [...nav.children].forEach(el => {
    el.classList.toggle('hidden', !temPermissao(el.dataset.view));
  });
  const s = sessaoAtual();
  document.getElementById('user-badge').innerHTML =
    `Conectado como <strong style="color:var(--texto-claro);">${s.nome}</strong>` +
    (s.admin ? ' <span style="color:var(--faixa);">(admin)</span>' : '');
}

function mostrarApp() {
  document.getElementById('auth-screen').classList.add('hidden');
  document.getElementById('app-shell').classList.remove('hidden');
  document.getElementById('mobile-bar').classList.remove('hidden');
  montarNavPorPermissao();
  const primeiraView = temPermissao('dashboard') ? 'dashboard'
    : (MODULOS.find(m => temPermissao(m.key)) || {}).key;
  if (primeiraView) renderView(primeiraView);
  else main.innerHTML = '<div class="empty-state">Seu usuário não tem acesso a nenhum módulo. Fale com o administrador.</div>';
}

function telaLogin(msgErro) {
  const body = document.getElementById('auth-body');
  body.innerHTML = `
    ${msgErro ? `<div class="auth-error">${msgErro}</div>` : ''}
    <form id="login-form">
      <div class="form-field"><label>Usuário</label><input name="usuario" required autocomplete="username" autofocus></div>
      <div class="form-field"><label>Senha</label><input name="senha" type="password" required autocomplete="current-password"></div>
      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:6px;">Entrar</button>
    </form>`;
  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const usuario = String(fd.get('usuario')).trim().toLowerCase();
    const senha = String(fd.get('senha'));
    const u = Store.list('users').find(x => x.usuario === usuario);
    if (!u) return telaLogin('Usuário ou senha incorretos.');
    const h = await hashSenha(senha, u.salt);
    if (h !== u.hash) return telaLogin('Usuário ou senha incorretos.');
    sessionStorage.setItem('frota_sessao', JSON.stringify({
      userId: u.id, nome: u.nome, admin: !!u.admin, permissoes: u.permissoes || []
    }));
    mostrarApp();
  });
}

function telaPrimeiroAcesso() {
  const body = document.getElementById('auth-body');
  body.innerHTML = `
    <div class="auth-info">Primeiro acesso: crie a conta do administrador. Guarde bem a senha — não há recuperação automática.</div>
    <form id="setup-form">
      <div class="form-field"><label>Seu nome</label><input name="nome" required></div>
      <div class="form-field"><label>Usuário (para login)</label><input name="usuario" required placeholder="ex: delair"></div>
      <div class="form-field"><label>Senha</label><input name="senha" type="password" required minlength="4"></div>
      <div class="form-field"><label>Confirmar senha</label><input name="senha2" type="password" required></div>
      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:6px;">Criar administrador</button>
    </form>`;
  document.getElementById('setup-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    if (fd.get('senha') !== fd.get('senha2')) {
      const body2 = document.getElementById('auth-body');
      body2.insertAdjacentHTML('afterbegin', '<div class="auth-error">As senhas não conferem.</div>');
      return;
    }

    const hash = await hashSenha(String(fd.get('senha')), salt);
    const u = Store.insert('users', {
      nome: String(fd.get('nome')).trim(),
      usuario: String(fd.get('usuario')).trim().toLowerCase(),

    });
    sessionStorage.setItem('frota_sessao', JSON.stringify({
      userId: u.id, nome: u.nome, admin: true, permissoes: u.permissoes
    }));
    toast('Administrador criado. Bem-vindo!');
    mostrarApp();
  });
}

    <div class="form-field"><label>Perfil</label>
      <select name="admin" id="user-admin">
        <option value="nao" ${!u.admin ? 'selected' : ''}>Usuário comum</option>

      </select>
    </div>

      <div class="perm-grid" id="perm-grid">
        ${MODULOS.map(m => `<label><input type="checkbox" name="perm_${m.key}" ${perms.includes(m.key) ? 'checked' : ''}> ${m.label}</label>`).join('')}
      </div>
    </div>`;
}

function openUserModal(record) {
  const isEdit = !!record;
  openModal(isEdit ? 'Editar usuário' : 'Novo usuário', userFormFields(record || {}), async (payload) => {
    const usuario = String(payload.usuario).trim().toLowerCase();
    if (!isEdit && Store.list('users').some(x => x.usuario === usuario)) {
      toast('Já existe um usuário com esse login.', 'error');
      return;
    }
    const admin = payload.admin === 'sim';
    const permissoes = admin ? MODULOS.map(m => m.key) : MODULOS.filter(m => payload['perm_' + m.key] === 'on').map(m => m.key);
    const dados = { nome: String(payload.nome).trim(), usuario, admin, permissoes };
    if (payload.senha) {
      dados.salt = gerarSalt();
      dados.hash = await hashSenha(String(payload.senha), dados.salt);
    }
    if (isEdit) {
      // proteção: não permitir remover o último administrador
      if (record.admin && !admin) {
        const outrosAdmins = Store.list('users').filter(x => x.admin && x.id !== record.id).length;
        if (outrosAdmins === 0) { toast('Não é possível rebaixar o único administrador.', 'error'); return; }
      }
      Store.update('users', record.id, dados);
      const s = sessaoAtual();
      if (s && s.userId === record.id) {
        sessionStorage.setItem('frota_sessao', JSON.stringify({ userId: record.id, nome: dados.nome, admin, permissoes }));
        montarNavPorPermissao();
      }
      toast('Usuário atualizado.');
    } else {
      Store.insert('users', dados);
      toast('Usuário criado.');
    }
    closeModal();
    renderView('users');
  });
}

views.users = function () {
  const s = sessaoAtual();
  if (!s || !s.admin) { main.innerHTML = '<div class="empty-state">Acesso restrito ao administrador.</div>'; return; }
  const usuarios = Store.list('users');

  const rows = usuarios.map(u => `
    <tr>
      <td><strong>${u.nome}</strong></td>
      <td>${u.usuario}</td>
      <td>${u.admin ? '<span class="status-pill ativo">Administrador</span>' : '<span class="status-pill inativo">Usuário</span>'}</td>
      <td style="font-size:12px;color:#6B747B;">${u.admin ? 'Todos os módulos' : (u.permissoes || []).map(k => (MODULOS.find(m => m.key === k) || {}).label).filter(Boolean).join(', ') || 'Nenhum'}</td>
      <td>
        <div class="row-actions">
          <button class="btn btn-ghost btn-sm" data-edit="${u.id}">Editar</button>
          ${u.id === s.userId ? '' : `<button class="btn btn-danger btn-sm" data-del="${u.id}">Excluir</button>`}
        </div>
      </td>
    </tr>`).join('');

  main.innerHTML = `
    <div class="page-header">
      <div><h1 class="page-title">Usuários</h1><div class="page-sub">${usuarios.length} usuário(s) — controle de acesso por módulo</div></div>
      <button class="btn btn-accent" id="btn-new">+ Novo usuário</button>
    </div>
    <div class="table-wrap"><table>
      <thead><tr><th>Nome</th><th>Login</th><th>Perfil</th><th>Módulos</th><th></th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>`;

  document.getElementById('btn-new').addEventListener('click', () => openUserModal());
  main.querySelectorAll('[data-edit]').forEach(btn => btn.addEventListener('click', () => openUserModal(usuarios.find(x => x.id == btn.dataset.edit))));
  main.querySelectorAll('[data-del]').forEach(btn => btn.addEventListener('click', () => {
    const alvo = usuarios.find(x => x.id == btn.dataset.del);
    if (alvo.admin && usuarios.filter(x => x.admin).length === 1) { toast('Não é possível excluir o único administrador.', 'error'); return; }
    if (!confirm(`Excluir o usuário "${alvo.nome}"?`)) return;
    Store.remove('users', alvo.id);
    toast('Usuário excluído.');
    renderView('users');
  }));
};

/* ==================== RELATORIOS ==================== */
const relatorioEstado = { aba: 'vendas', ini: null, fim: null, dim: 'cliente', detalhe: null };

// Coleta itens de VENDAS no periodo (por status fechado/concluido)
function relVendasItens(ini, fim) {
  const dentro = (d) => d && d >= ini && d <= fim;
  const itens = [];
  Store.list('sales').filter(s => s.status === 'fechado' || s.status === 'concluido').forEach(s => {
    if (!dentro(s.data)) return;
    itens.push({
      cliente: s.cliente || 'Sem cliente',
      destino: s.destino || 'Sem destino',
      origem: s.origem || 'Sem origem',
      forma: s.forma_pgto || 'Nao informado',
      valor: Number(s.valor_total != null ? s.valor_total : s.valor) || 0,
      valorFrete: Number(s.valor) || 0,
      valorAjudante: Number(s.valor_ajudantes_total) || 0,
      qtdEntregas: Math.max(1, Number(s.qtd_entregas) || 1),
      peso: Number(s.peso_kg) || 0,
      data: s.data,
      status: s.status,
      descricao: s.descricao_carga || ''
    });
  });
  return itens;
}

// Coleta itens de COMPRAS no periodo (combustivel, manutencao, compras gerais)
function relComprasItens(ini, fim) {
  const dentro = (d) => d && d >= ini && d <= fim;
  const itens = [];
  Store.list('fuel').forEach(f => {
    if (!dentro(f.data)) return;
    itens.push({
      fornecedor: f.posto || 'Nao informado',
      categoria: 'Combustível',
      valor: Number(f.valor_total) || 0,
      data: f.data,
      descricao: 'Abastecimento ' + ((Store.get('vehicles', f.vehicle_id) || {}).placa || '') + ' (' + (f.litros || 0) + ' L)'
    });
  });
  Store.list('maintenance').forEach(m => {
    if (!dentro(m.data) || !(Number(m.custo) > 0)) return;
    itens.push({
      fornecedor: m.oficina || 'Nao informado',
      categoria: 'Manutenção',
      valor: Number(m.custo) || 0,
      data: m.data,
      descricao: (m.descricao || 'Manutencao') + ' — ' + ((Store.get('vehicles', m.vehicle_id) || {}).placa || '')
    });
  });
  Store.list('finance').filter(l => l.origem === 'compra' && !l.ref_tabela).forEach(l => {
    if (!dentro(l.data)) return;
    itens.push({
      fornecedor: l.fornecedor || 'Nao informado',
      categoria: l.categoria || 'Outros',
      valor: Number(l.valor) || 0,
      data: l.data,
      descricao: (l.descricao || '').replace(/ \(parcela \d+\/\d+\)$/, '').replace(/^[^:]+:\s*/, '')
    });
  });
  return itens;
}

// Agrupa por uma dimensao (campo) e ordena desc; retorna [{chave, valor, qtd}]
function relAgrupar(itens, campo) {
  const mapa = {};
  itens.forEach(it => {
    const k = it[campo] || 'Nao informado';
    if (!mapa[k]) mapa[k] = { chave: k, valor: 0, qtd: 0 };
    mapa[k].valor += it.valor;
    mapa[k].qtd += 1;
  });
  return Object.values(mapa).sort((a, b) => b.valor - a.valor);
}

// Classifica curva ABC: A ate 80%, B ate 95%, C o resto (acumulado)
function relCurvaABC(grupos, total) {
  let acum = 0;
  return grupos.map(g => {
    acum += g.valor;
    const pctAcum = total > 0 ? (acum / total) * 100 : 0;
    const pct = total > 0 ? (g.valor / total) * 100 : 0;
    let classe = 'C';
    if (pctAcum <= 80) classe = 'A';
    else if (pctAcum <= 95) classe = 'B';
    return { chave: g.chave, valor: g.valor, qtd: g.qtd, pct: pct, pctAcum: pctAcum, classe: classe };
  });
}

function relClasseCor(c) {
  if (c === 'A') return '#3E9B5C';
  if (c === 'B') return '#F2B705';
  return '#8A929A';
}

function renderRelatorios() {
  if (!relatorioEstado.ini) {
    const h = new Date();
    relatorioEstado.ini = new Date(h.getFullYear(), h.getMonth() - 5, 1).toISOString().slice(0, 10);
    relatorioEstado.fim = todayISO();
  }
  const aba = relatorioEstado.aba;
  const ini = relatorioEstado.ini;
  const fim = relatorioEstado.fim;

  const ehVendas = aba === 'vendas';
  const itens = ehVendas ? relVendasItens(ini, fim) : relComprasItens(ini, fim);
  const total = itens.reduce((s, it) => s + it.valor, 0);
  const qtd = itens.length;
  const ticket = qtd > 0 ? total / qtd : 0;

  // dimensoes disponiveis por aba
  const dims = ehVendas
    ? [['cliente', 'Cliente'], ['destino', 'Destino'], ['forma', 'Forma de pgto']]
    : [['fornecedor', 'Fornecedor'], ['categoria', 'Categoria']];
  // garante dimensao valida ao trocar de aba
  if (!dims.some(d => d[0] === relatorioEstado.dim)) relatorioEstado.dim = dims[0][0];
  const dim = relatorioEstado.dim;

  const grupos = relAgrupar(itens, dim);
  const abc = relCurvaABC(grupos, total);

  const contA = abc.filter(x => x.classe === 'A');
  const contB = abc.filter(x => x.classe === 'B');
  const contC = abc.filter(x => x.classe === 'C');
  const valA = contA.reduce((s, x) => s + x.valor, 0);
  const valB = contB.reduce((s, x) => s + x.valor, 0);
  const valC = contC.reduce((s, x) => s + x.valor, 0);

  // linhas da tabela ABC
  let linhas = '';

    const w = total > 0 ? Math.round(x.valor / abc[0].valor * 100) : 0;
    const cor = relClasseCor(x.classe);
    const classeCss = x.classe === 'A' ? 'abc-a' : (x.classe === 'B' ? 'abc-b' : 'abc-c');

      + '<td style="font-variant-numeric:tabular-nums;color:#6B747B;">' + x.pctAcum.toFixed(1) + '%</td>'
      + '<td><span class="abc-badge ' + classeCss + '">' + x.classe + '</span></td>'
      + '</tr>';
  });
  if (!linhas) linhas = '<tr><td colspan="7" class="empty-state">Sem dados no período selecionado.</td></tr>';

  // chips de dimensao
  let dimChips = '';
  dims.forEach(d => {
    dimChips += '<button class="tab-chip ' + (d[0] === dim ? 'active' : '') + '" data-dim="' + d[0] + '">' + d[1] + '</button>';
  });

  const tituloDim = (dims.find(d => d[0] === dim) || ['', ''])[1];
  const corTotal = ehVendas ? 'var(--verde-ok)' : 'var(--vermelho-alerta)';

  html += '<button class="tab-chip ' + (!ehVendas ? 'active' : '') + '" data-relaba="compras">Compras</button>';
  html += '</div>';

  // filtro de periodo
  html += '<div class="card" style="margin-bottom:16px;"><div style="display:flex;gap:14px;align-items:flex-end;flex-wrap:wrap;">';

        detLinhas += '<tr>'

          + '<td>' + (it.origem !== 'Sem origem' ? it.origem + ' → ' : '') + '<strong>' + it.destino + '</strong></td>'
          + '<td>' + (it.descricao || '—') + '</td>'
          + '<td>' + (it.peso ? it.peso.toLocaleString('pt-BR') + ' kg' : '—') + '</td>'
          + '<td style="text-align:center;">' + (it.qtdEntregas || 1) + '</td>'
          + '<td>' + it.forma + '</td>'
          + '<td style="text-align:right;">' + fmtMoney(it.valorFrete || 0) + '</td>'
          + '<td style="text-align:right;color:' + (temAjud ? 'var(--faixa-escura)' : '#8A929A') + ';">' + (temAjud ? fmtMoney(it.valorAjudante) : '—') + '</td>'
          + '<td style="font-weight:600;text-align:right;">' + fmtMoney(it.valor) + '</td>'
          + '</tr>';
      } else {
        detLinhas += '<tr>'
          + '<td>' + fmtDate(it.data) + '</td>'
          + '<td>' + it.categoria + '</td>'
          + '<td>' + (it.descricao || '—') + '</td>'
          + '<td style="font-weight:600;text-align:right;">' + fmtMoney(it.valor) + '</td>'
          + '</tr>';
      }
    });

    const cabDet = ehVendas
      ? '<tr><th>Data</th><th>Rota</th><th>Carga</th><th>Peso</th><th style="text-align:center;">Entregas</th><th>Pgto</th><th style="text-align:right;">Frete</th><th style="text-align:right;">Ajudantes</th><th style="text-align:right;">Total</th></tr>'
      : '<tr><th>Data</th><th>Categoria</th><th>Descrição</th><th style="text-align:right;">Valor</th></tr>';
    const colspanDet = ehVendas ? 9 : 4;

    let html2 = '';
    html2 += '<div class="card" style="margin-top:16px;border:2px solid var(--faixa);">';
    html2 += '<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:12px;">';
    html2 += '<div><p class="card-title" style="margin:0;">' + (ehVendas ? '📄 ' : '📄 ') + chaveSel + '</p><div class="page-sub" style="margin-top:2px;">' + detItens.length + ' ' + (ehVendas ? 'venda(s)' : 'compra(s)') + ' no período · total ' + fmtMoney(detTotal) + '</div></div>';
    html2 += '<button class="btn btn-ghost btn-sm" id="rel-fechar-det">✕ Fechar</button>';
    html2 += '</div>';
    html2 += '<div style="overflow-x:auto;"><table><thead>' + cabDet + '</thead><tbody>';
    html2 += (detLinhas || '<tr><td colspan="' + colspanDet + '" class="empty-state">Sem itens.</td></tr>');
    html2 += '</tbody></table></div></div>';
    html += html2;
  }

  main.innerHTML = html;

  // handlers de aba
  main.querySelectorAll('[data-relaba]').forEach(btn => btn.addEventListener('click', () => {
    relatorioEstado.aba = btn.dataset.relaba;
    relatorioEstado.detalhe = null;
    renderRelatorios();
  }));
  // handlers de dimensao
  main.querySelectorAll('[data-dim]').forEach(btn => btn.addEventListener('click', () => {
    relatorioEstado.dim = btn.dataset.dim;
    relatorioEstado.detalhe = null;
    renderRelatorios();
  }));
  // clique na linha abre detalhamento
  main.querySelectorAll('[data-drill]').forEach(row => row.addEventListener('click', () => {
    relatorioEstado.detalhe = decodeURIComponent(row.dataset.drill);
    renderRelatorios();
  }));
  // fechar detalhamento
  const btnFecharDet = document.getElementById('rel-fechar-det');
  if (btnFecharDet) btnFecharDet.addEventListener('click', () => {
    relatorioEstado.detalhe = null;
    renderRelatorios();
  });
  // aplicar periodo
  document.getElementById('rel-aplicar').addEventListener('click', () => {
    const i = document.getElementById('rel-ini').value;
    const f = document.getElementById('rel-fim').value;
    if (i && f && i <= f) {
      relatorioEstado.ini = i;
      relatorioEstado.fim = f;
      renderRelatorios();
    } else {
      toast('Verifique as datas do período.', 'error');
    }
  });
  // atalhos de periodo
  main.querySelectorAll('[data-relatalho]').forEach(btn => btn.addEventListener('click', () => {
    const hoje = new Date();
    let iniD;
    const k = btn.dataset.relatalho;
    if (k === 'mes') iniD = new Date(hoje.getFullYear(), hoje.getMonth(), 1);
    else if (k === '3m') iniD = new Date(hoje.getFullYear(), hoje.getMonth() - 2, 1);
    else if (k === '6m') iniD = new Date(hoje.getFullYear(), hoje.getMonth() - 5, 1);
    else iniD = new Date(hoje.getFullYear(), 0, 1);
    relatorioEstado.ini = iniD.toISOString().slice(0, 10);
    relatorioEstado.fim = todayISO();
    renderRelatorios();
  }));

  // exportar CSV
  document.getElementById('rel-csv').addEventListener('click', () => {
    exportarRelatorioCSV(abc, tituloDim, ehVendas, ini, fim);
  });
  // exportar Excel com abas por cliente/fornecedor
  document.getElementById('rel-xlsx').addEventListener('click', () => {
    exportarRelatorioXLSX(abc, grupos, itens, dim, tituloDim, ehVendas, ini, fim);
  });
  // imprimir / salvar PDF
  document.getElementById('rel-print').addEventListener('click', () => {
    imprimirRelatorio(abc, tituloDim, ehVendas, ini, fim, total, ticket, qtd, valA, valB, valC, contA.length, contB.length, contC.length);
  });
}

function exportarRelatorioCSV(abc, tituloDim, ehVendas, ini, fim) {
  const sep = ';';
  let csv = (ehVendas ? 'Relatorio de Vendas' : 'Relatorio de Compras') + ' - Curva ABC por ' + tituloDim + '\n';
  csv += 'Periodo:' + sep + fmtDate(ini) + ' a ' + fmtDate(fim) + '\n\n';
  csv += ['#', tituloDim, 'Valor', 'Qtd', '%', '% acumulado', 'Classe'].join(sep) + '\n';
  abc.forEach((x, i) => {
    const valorFmt = x.valor.toFixed(2).replace('.', ',');
    const linha = [
      (i + 1),
      '"' + String(x.chave).replace(/"/g, '""') + '"',
      valorFmt,
      x.qtd,
      x.pct.toFixed(1).replace('.', ',') + '%',
      x.pctAcum.toFixed(1).replace('.', ',') + '%',
      x.classe
    ];
    csv += linha.join(sep) + '\n';
  });
  const total = abc.reduce((s, x) => s + x.valor, 0);
  csv += '\nTOTAL' + sep + sep + total.toFixed(2).replace('.', ',') + '\n';

  // BOM para acentos abrirem certo no Excel
  const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = (ehVendas ? 'relatorio_vendas_' : 'relatorio_compras_') + tituloDim.toLowerCase() + '_' + ini + '_a_' + fim + '.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('CSV exportado.');
}

function exportarRelatorioXLSX(abc, grupos, itens, dim, tituloDim, ehVendas, ini, fim) {
  const usados = {};
  const abas = [];

  // Aba Resumo = curva ABC
  const resumo = [];
  resumo.push([(ehVendas ? 'Relatório de Vendas' : 'Relatório de Compras') + ' — Curva ABC por ' + tituloDim]);
  resumo.push(['Período: ' + fmtDate(ini) + ' a ' + fmtDate(fim)]);
  resumo.push([]);
  resumo.push(['#', tituloDim, 'Valor', 'Qtd', '%', '% acumulado', 'Classe']);
  const headerResumo = resumo.length - 1;
  abc.forEach((x, i) => {
    resumo.push([i + 1, x.chave, Math.round(x.valor * 100) / 100, x.qtd, Math.round(x.pct * 10) / 10, Math.round(x.pctAcum * 10) / 10, x.classe]);
  });
  const totalGeral = abc.reduce((s, x) => s + x.valor, 0);
  resumo.push([]);
  resumo.push(['', 'TOTAL', Math.round(totalGeral * 100) / 100, abc.reduce((s, x) => s + x.qtd, 0), '', '', '']);
  abas.push({
    nome: _sheetName('Resumo ABC', usados),
    linhas: resumo,
    opts: {
      titleRows: [0], headerRows: [headerResumo], totalRows: [resumo.length - 1],
      moneyCols: [2], colWidths: [5, 34, 16, 8, 8, 13, 9]
    }
  });

  // Uma aba por grupo (cliente/fornecedor), com o detalhamento das transacoes
  grupos.forEach(g => {
    const itensGrupo = itens.filter(it => (it[dim] || 'Não informado') === g.chave)
      .sort((a, b) => (a.data || '').localeCompare(b.data || ''));
    const linhas = [];
    linhas.push([tituloDim + ': ' + g.chave]);
    linhas.push(['Total: ' + fmtMoney(g.valor) + '  |  ' + g.qtd + (ehVendas ? ' venda(s)' : ' compra(s)')]);
    linhas.push([]);
    const headerIdx = linhas.length;
    let opts;
    if (ehVendas) {
      linhas.push(['Data', 'Origem', 'Destino', 'Carga', 'Peso (kg)', 'Entregas', 'Forma pgto', 'Status', 'Frete (R$)', 'Ajudantes (R$)', 'Total (R$)']);
      itensGrupo.forEach(it => {
        linhas.push([
          fmtDate(it.data),
          it.origem !== 'Sem origem' ? it.origem : '',
          it.destino,
          it.descricao || '',
          it.peso || 0,
          it.qtdEntregas || 1,
          it.forma,
          it.status === 'concluido' ? 'Concluído' : 'Fechado',
          Math.round((it.valorFrete || 0) * 100) / 100,
          Math.round((it.valorAjudante || 0) * 100) / 100,
          Math.round(it.valor * 100) / 100
        ]);
      });
      opts = { moneyCols: [8, 9, 10], colWidths: [12, 16, 18, 26, 10, 9, 13, 11, 14, 15, 14] };
    } else {
      linhas.push(['Data', 'Categoria', 'Descrição', 'Valor (R$)']);
      itensGrupo.forEach(it => {
        linhas.push([fmtDate(it.data), it.categoria, it.descricao || '', Math.round(it.valor * 100) / 100]);
      });
      opts = { moneyCols: [3], colWidths: [12, 18, 40, 14] };
    }
    linhas.push([]);
    let colTotal;
    if (ehVendas) {
      const totFrete = itensGrupo.reduce((s, it) => s + (it.valorFrete || 0), 0);
      const totAjud = itensGrupo.reduce((s, it) => s + (it.valorAjudante || 0), 0);
      colTotal = ['', '', '', '', '', '', '', 'TOTAL', Math.round(totFrete * 100) / 100, Math.round(totAjud * 100) / 100, Math.round(g.valor * 100) / 100];
    } else {
      colTotal = ['', '', 'TOTAL', Math.round(g.valor * 100) / 100];
    }
    linhas.push(colTotal);
    opts.titleRows = [0];
    opts.headerRows = [headerIdx];
    opts.totalRows = [linhas.length - 1];
    abas.push({ nome: _sheetName(g.chave, usados), linhas: linhas, opts: opts });
  });

  if (abas.length <= 1) { toast('Sem dados no período para exportar.', 'error'); return; }

  const bytes = gerarXLSX(abas);
  const blob = new Blob([bytes], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = (ehVendas ? 'relatorio_vendas_por_' : 'relatorio_compras_por_') + tituloDim.toLowerCase() + '_' + ini + '_a_' + fim + '.xlsx';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('Excel gerado com ' + (abas.length - 1) + ' aba(s) de ' + tituloDim.toLowerCase() + '.');
}

/* ==================== GERADOR XLSX (JS puro, sem dependencias) ==================== */
// Tabela CRC32
var _crcTable = (function () {
  var t = [];
  for (var n = 0; n < 256; n++) {
    var c = n;
    for (var k = 0; k < 8; k++) c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1);
    t[n] = c >>> 0;
  }
  return t;
})();
function _crc32(bytes) {
  var crc = 0xFFFFFFFF;
  for (var i = 0; i < bytes.length; i++) crc = (crc >>> 8) ^ _crcTable[(crc ^ bytes[i]) & 0xFF];
  return (crc ^ 0xFFFFFFFF) >>> 0;
}
function _strToBytes(str) {
  // UTF-8
  var out = [];
  for (var i = 0; i < str.length; i++) {
    var c = str.charCodeAt(i);
    if (c < 0x80) out.push(c);
    else if (c < 0x800) { out.push(0xC0 | (c >> 6), 0x80 | (c & 0x3F)); }
    else if (c >= 0xD800 && c <= 0xDBFF) {
      // surrogate pair
      var c2 = str.charCodeAt(++i);
      var cp = 0x10000 + ((c - 0xD800) << 10) + (c2 - 0xDC00);
      out.push(0xF0 | (cp >> 18), 0x80 | ((cp >> 12) & 0x3F), 0x80 | ((cp >> 6) & 0x3F), 0x80 | (cp & 0x3F));
    } else { out.push(0xE0 | (c >> 12), 0x80 | ((c >> 6) & 0x3F), 0x80 | (c & 0x3F)); }
  }
  return out;
}
function _u16(n) { return [n & 0xFF, (n >> 8) & 0xFF]; }
function _u32(n) { return [n & 0xFF, (n >> 8) & 0xFF, (n >> 16) & 0xFF, (n >> 24) & 0xFF]; }

// Monta um ZIP store-mode a partir de [{name, bytes}] e retorna Uint8Array
function _zip(files) {
  var chunks = [];
  var central = [];
  var offset = 0;
  files.forEach(function (f) {
    var crc = _crc32(f.bytes);
    var nameBytes = _strToBytes(f.name);
    // local file header
    var lh = [].concat(
      _u32(0x04034b50), _u16(20), _u16(0), _u16(0), _u16(0), _u16(0),
      _u32(crc), _u32(f.bytes.length), _u32(f.bytes.length),
      _u16(nameBytes.length), _u16(0), nameBytes, f.bytes
    );
    chunks.push(lh);
    // central directory entry
    var cd = [].concat(
      _u32(0x02014b50), _u16(20), _u16(20), _u16(0), _u16(0), _u16(0), _u16(0),
      _u32(crc), _u32(f.bytes.length), _u32(f.bytes.length),
      _u16(nameBytes.length), _u16(0), _u16(0), _u16(0), _u16(0), _u32(0),
      _u32(offset), nameBytes
    );
    central.push(cd);
    offset += lh.length;
  });
  var centralStart = offset;
  var centralBytes = [];
  central.forEach(function (c) { centralBytes = centralBytes.concat(c); });
  var end = [].concat(
    _u32(0x06054b50), _u16(0), _u16(0), _u16(files.length), _u16(files.length),
    _u32(centralBytes.length), _u32(centralStart), _u16(0)
  );
  var all = [];
  chunks.forEach(function (c) { all = all.concat(c); });
  all = all.concat(centralBytes).concat(end);
  return new Uint8Array(all);
}

function _xmlEsc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&apos;');
}

// nome de aba valido: max 31 chars, sem : \ / ? * [ ]
function _sheetName(nome, usados) {
  var n = String(nome || 'Aba').replace(/[:\\\/\?\*\[\]]/g, ' ').trim().slice(0, 28);
  if (!n) n = 'Aba';
  var base = n, i = 2;
  while (usados[n.toLowerCase()]) { n = (base.slice(0, 25) + ' (' + i + ')'); i++; }
  usados[n.toLowerCase()] = true;
  return n;
}

function _colLetra(idx) {
  var s = '';
  idx++;
  while (idx > 0) { var m = (idx - 1) % 26; s = String.fromCharCode(65 + m) + s; idx = Math.floor((idx - 1) / 26); }
  return s;
}

// Monta uma planilha a partir de linhas (array de arrays). Cada celula: numero -> numerica; string -> texto
// opts: { headerRows:[idx], totalRows:[idx], moneyCols:[idx], colWidths:[..] }
function _sheetXml(linhas, opts) {
  opts = opts || {};
  var headerRows = opts.headerRows || [];
  var totalRows = opts.totalRows || [];
  var moneyCols = opts.moneyCols || [];
  var titleRows = opts.titleRows || [];
  var rows = '';
  for (var r = 0; r < linhas.length; r++) {
    var cells = '';
    var ehHeader = headerRows.indexOf(r) !== -1;
    var ehTotal = totalRows.indexOf(r) !== -1;
    var ehTitle = titleRows.indexOf(r) !== -1;
    for (var c = 0; c < linhas[r].length; c++) {
      var v = linhas[r][c];
      var ref = _colLetra(c) + (r + 1);
      var ehMoney = moneyCols.indexOf(c) !== -1;
      // define o índice de estilo (s) conforme o tipo de célula
      var s = 0;
      if (ehTitle) s = 5;
      else if (ehHeader) s = 1;
      else if (ehTotal) s = ehMoney ? 4 : 3;
      else if (ehMoney) s = 2;
      if (typeof v === 'number' && isFinite(v)) {
        cells += '<c r="' + ref + '" s="' + s + '"><v>' + v + '</v></c>';
      } else {
        cells += '<c r="' + ref + '" s="' + s + '" t="inlineStr"><is><t xml:space="preserve">' + _xmlEsc(v) + '</t></is></c>';
      }
    }
    rows += '<row r="' + (r + 1) + '"' + (ehHeader || ehTotal ? ' ht="18" customHeight="1"' : '') + '>' + cells + '</row>';
  }
  // larguras de coluna
  var colsXml = '';
  if (opts.colWidths && opts.colWidths.length) {
    colsXml = '<cols>';
    for (var i2 = 0; i2 < opts.colWidths.length; i2++) {
      colsXml += '<col min="' + (i2 + 1) + '" max="' + (i2 + 1) + '" width="' + opts.colWidths[i2] + '" customWidth="1"/>';
    }
    colsXml += '</cols>';
  }
  // sheetView: sem linhas de grade; congela cabeçalho se houver
  var paneXml = '';
  if (headerRows.length) {
    var hr = Math.max.apply(null, headerRows) + 1;
    paneXml = '<pane ySplit="' + hr + '" topLeftCell="A' + (hr + 1) + '" activePane="bottomLeft" state="frozen"/>';
  }
  var freeze = '<sheetViews><sheetView showGridLines="0" workbookViewId="0">' + paneXml + '</sheetView></sheetViews>';
  return '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>'
    + '<worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main">'
    + freeze + colsXml
    + '<sheetData>' + rows + '</sheetData></worksheet>';
}

// styles.xml com: header (fundo escuro, branco, bold), moeda, total, título
function _stylesXml() {
  return '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>'
    + '<styleSheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main">'
    + '<numFmts count="1"><numFmt numFmtId="164" formatCode="&quot;R$&quot;\\ #,##0.00"/></numFmts>'
    + '<fonts count="4">'
    + '<font><sz val="11"/><color rgb="FF1E2124"/><name val="Calibri"/></font>'          // 0 normal
    + '<font><b/><sz val="11"/><color rgb="FFFFFFFF"/><name val="Calibri"/></font>'       // 1 header branco
    + '<font><b/><sz val="11"/><color rgb="FF1E2124"/><name val="Calibri"/></font>'       // 2 bold escuro
    + '<font><b/><sz val="13"/><color rgb="FFC1212D"/><name val="Calibri"/></font>'       // 3 título vermelho
    + '</fonts>'
    + '<fills count="4">'
    + '<fill><patternFill patternType="none"/></fill>'                                     // 0
    + '<fill><patternFill patternType="gray125"/></fill>'                                  // 1 (reservado)
    + '<fill><patternFill patternType="solid"><fgColor rgb="FF1E2124"/></patternFill></fill>' // 2 header escuro
    + '<fill><patternFill patternType="solid"><fgColor rgb="FFF2F3F4"/></patternFill></fill>' // 3 total cinza
    + '</fills>'
    + '<borders count="2">'
    + '<border><left/><right/><top/><bottom/><diagonal/></border>'                          // 0
    + '<border><left/><right/><top style="thin"><color rgb="FFB0B6BB"/></top><bottom/><diagonal/></border>' // 1 topo
    + '</borders>'
    + '<cellStyleXfs count="1"><xf numFmtId="0" fontId="0" fillId="0" borderId="0"/></cellStyleXfs>'
    + '<cellXfs count="6">'
    + '<xf numFmtId="0" fontId="0" fillId="0" borderId="0" xfId="0"/>'                                       // 0 normal
    + '<xf numFmtId="0" fontId="1" fillId="2" borderId="0" xfId="0" applyFont="1" applyFill="1"><alignment vertical="center"/></xf>' // 1 header
    + '<xf numFmtId="164" fontId="0" fillId="0" borderId="0" xfId="0" applyNumberFormat="1"/>'               // 2 moeda
    + '<xf numFmtId="0" fontId="2" fillId="3" borderId="1" xfId="0" applyFont="1" applyFill="1" applyBorder="1"/>' // 3 total texto
    + '<xf numFmtId="164" fontId="2" fillId="3" borderId="1" xfId="0" applyNumberFormat="1" applyFont="1" applyFill="1" applyBorder="1"/>' // 4 total moeda
    + '<xf numFmtId="0" fontId="3" fillId="0" borderId="0" xfId="0" applyFont="1"/>'                         // 5 título
    + '</cellXfs>'
    + '<cellStyles count="1"><cellStyle name="Normal" xfId="0" builtinId="0"/></cellStyles>'
    + '</styleSheet>';
}

// abas = [{nome, linhas, opts}] -> Uint8Array do xlsx
function gerarXLSX(abas) {
  var files = [];
  // [Content_Types].xml
  var ov = '';
  for (var i = 0; i < abas.length; i++) {
    ov += '<Override PartName="/xl/worksheets/sheet' + (i + 1) + '.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/>';
  }
  files.push({ name: '[Content_Types].xml', bytes: _strToBytes(
    '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>'
    + '<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">'
    + '<Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>'
    + '<Default Extension="xml" ContentType="application/xml"/>'
    + '<Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/>'
    + '<Override PartName="/xl/styles.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.styles+xml"/>'
    + ov + '</Types>') });
  // _rels/.rels
  files.push({ name: '_rels/.rels', bytes: _strToBytes(
    '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>'
    + '<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">'
    + '<Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/>'
    + '</Relationships>') });
  // xl/workbook.xml
  var sheetsXml = '';
  var relsXml = '';
  for (var j = 0; j < abas.length; j++) {
    sheetsXml += '<sheet name="' + _xmlEsc(abas[j].nome) + '" sheetId="' + (j + 1) + '" r:id="rId' + (j + 1) + '"/>';
    relsXml += '<Relationship Id="rId' + (j + 1) + '" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet' + (j + 1) + '.xml"/>';
  }
  // relação extra para styles.xml
  var stylesRelId = 'rId' + (abas.length + 1);
  relsXml += '<Relationship Id="' + stylesRelId + '" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/styles" Target="styles.xml"/>';
  files.push({ name: 'xl/workbook.xml', bytes: _strToBytes(
    '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>'
    + '<workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships">'
    + '<sheets>' + sheetsXml + '</sheets></workbook>') });
  // xl/_rels/workbook.xml.rels
  files.push({ name: 'xl/_rels/workbook.xml.rels', bytes: _strToBytes(
    '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>'
    + '<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">'
    + relsXml + '</Relationships>') });
  // xl/styles.xml
  files.push({ name: 'xl/styles.xml', bytes: _strToBytes(_stylesXml()) });
  // sheets
  for (var k = 0; k < abas.length; k++) {
    files.push({ name: 'xl/worksheets/sheet' + (k + 1) + '.xml', bytes: _strToBytes(_sheetXml(abas[k].linhas, abas[k].opts)) });
  }
  return _zip(files);
}
