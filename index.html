<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ZANCANARO Gestão de Transportes</title>
<style>
:root {
  --asfalto: #1E2124;
  --asfalto-2: #2A2E33;
  --linha: #38424A;
  --faixa: #F2B705;
  --faixa-escura: #C99A00;
  --azul-sinal: #2E77B5;
  --verde-ok: #3E9B5C;
  --vermelho-alerta: #C1432E;
  --texto-claro: #F5F6F7;
  --texto-suave: #A8B0B8;
  --fundo-app: #F4F5F6;
  --card: #FFFFFF;
  --radius: 10px;
  --font-display: Arial, sans-serif;
  --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
  --font-mono: 'Consolas', 'Courier New', monospace;
}
* { box-sizing: border-box; }
body { margin: 0; font-family: var(--font-body); background: var(--fundo-app); color: #1B1E20; }
.app-shell { display: grid; grid-template-columns: 240px 1fr; min-height: 100vh; }
.sidebar { background: var(--asfalto); color: var(--texto-claro); display: flex; flex-direction: column; padding: 24px 0; position: relative; }
.sidebar::before { content: ""; position: absolute; top: 0; bottom: 0; right: 0; width: 6px; background: repeating-linear-gradient(to bottom, var(--faixa) 0px, var(--faixa) 18px, transparent 18px, transparent 34px); }
.brand { padding: 0 24px 20px 24px; border-bottom: 1px solid var(--linha); margin-bottom: 12px; }
.brand-title { font-family: var(--font-display); font-size: 26px; font-weight: 700; letter-spacing: 0.5px; line-height: 1; color: var(--texto-claro); }
.brand-sub { font-size: 11px; color: var(--texto-suave); text-transform: uppercase; letter-spacing: 1.5px; margin-top: 4px; }
.nav { display: flex; flex-direction: column; gap: 2px; padding: 0 12px; }
.nav-item { display: flex; align-items: center; gap: 12px; padding: 11px 14px; border-radius: 6px; color: var(--texto-suave); cursor: pointer; font-size: 14.5px; font-weight: 500; transition: background .15s, color .15s; user-select: none; }
.nav-item .num { font-family: var(--font-mono); font-size: 11px; color: var(--faixa-escura); width: 18px; }
.nav-item:hover { background: var(--asfalto-2); color: var(--texto-claro); }
.nav-item.active { background: var(--faixa); color: #1B1E20; font-weight: 700; }
.nav-item.active .num { color: #1B1E20; }
.sidebar-footer { margin-top: auto; padding: 16px 24px 0 24px; font-size: 11px; color: var(--texto-suave); border-top: 1px solid var(--linha); }
.main { padding: 28px 36px 60px 36px; max-width: 1180px; }
.page-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 22px; flex-wrap: wrap; gap: 10px; }
.page-title { font-family: var(--font-display); font-size: 30px; font-weight: 700; margin: 0; color: #14171A; }
.page-sub { color: #6B747B; font-size: 13.5px; margin-top: 2px; }
.fleet-strip { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 26px; }
.fleet-card { background: var(--card); border: 1px solid #E3E6E8; border-radius: var(--radius); padding: 12px 14px; position: relative; overflow: hidden; }
.fleet-card::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; }
.fleet-card.status-ativo::before { background: var(--verde-ok); }
.fleet-card.status-manutencao::before { background: var(--faixa); }
.fleet-card.status-inativo::before { background: #B9C0C6; }
.fleet-plate { font-family: var(--font-mono); font-weight: 700; font-size: 15px; letter-spacing: 0.5px; color: #14171A; }
.fleet-model { font-size: 11.5px; color: #6B747B; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.fleet-meta { display: flex; justify-content: space-between; margin-top: 8px; font-size: 11px; color: #8A929A; }
.status-pill { display: inline-block; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; padding: 2px 7px; border-radius: 20px; }
.status-pill.ativo { background: #E4F3E8; color: var(--verde-ok); }
.status-pill.manutencao { background: #FBF0D2; color: var(--faixa-escura); }
.status-pill.inativo { background: #EDEFF0; color: #74808A; }
.grid { display: grid; gap: 16px; }
.grid-2 { grid-template-columns: 1fr 1fr; }
.grid-4 { grid-template-columns: repeat(4, 1fr); }
.grid-5 { grid-template-columns: repeat(5, 1fr); }
.card { background: var(--card); border: 1px solid #E3E6E8; border-radius: var(--radius); padding: 18px 20px; }
.card-title { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: #6B747B; margin: 0 0 12px 0; display: flex; align-items: center; gap: 8px; }
.kpi-value { font-family: var(--font-display); font-size: 34px; font-weight: 700; color: #14171A; line-height: 1; }
.kpi-label { font-size: 12px; color: #8A929A; margin-top: 4px; }
.alert-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #EEF0F1; font-size: 13.5px; }
.alert-row:last-child { border-bottom: none; }
.alert-tag { font-family: var(--font-mono); font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 4px; white-space: nowrap; }
.alert-tag.vencido { background: #F8DEDA; color: var(--vermelho-alerta); }
.alert-tag.urgente { background: #FBF0D2; color: var(--faixa-escura); }
.alert-tag.ok { background: #E4F3E8; color: var(--verde-ok); }
.empty-state { color: #9AA1A7; font-size: 13.5px; padding: 8px 0; }
.table-wrap { background: var(--card); border: 1px solid #E3E6E8; border-radius: var(--radius); overflow: hidden; overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
thead th { text-align: left; background: #FAFBFB; color: #6B747B; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; padding: 11px 14px; border-bottom: 1px solid #E3E6E8; white-space: nowrap; }
tbody td { padding: 11px 14px; border-bottom: 1px solid #F0F1F2; color: #24282B; }
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover { background: #FBFCFC; }
.row-actions { display: flex; gap: 6px; }
.btn { font-family: var(--font-body); font-size: 13.5px; font-weight: 600; padding: 9px 16px; border-radius: 7px; border: none; cursor: pointer; transition: filter .15s, transform .1s; }
.btn:active { transform: translateY(1px); }
.btn-primary { background: var(--azul-sinal); color: white; }
.btn-primary:hover { filter: brightness(1.08); }
.btn-accent { background: var(--faixa); color: #1B1E20; }
.btn-accent:hover { filter: brightness(1.05); }
.btn-ghost { background: transparent; border: 1px solid #D7DBDE; color: #4A5259; }
.btn-ghost:hover { background: #F2F3F4; }
.btn-danger { background: transparent; color: var(--vermelho-alerta); border: 1px solid #EFC9C2; }
.btn-danger:hover { background: #FBEEEC; }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.modal-overlay { position: fixed; inset: 0; background: rgba(20,23,26,.55); display: flex; align-items: flex-start; justify-content: center; padding: 40px 20px; overflow-y: auto; z-index: 100; }
.modal { background: white; border-radius: 12px; width: 100%; max-width: 560px; padding: 26px 28px 22px 28px; }
.modal-title { font-family: var(--font-display); font-size: 22px; font-weight: 700; margin: 0 0 18px 0; color: #14171A; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 14px; }
.form-field { display: flex; flex-direction: column; gap: 5px; }
.form-field.full { grid-column: 1 / -1; }
.form-field label { font-size: 12px; font-weight: 600; color: #4A5259; }
.form-field input, .form-field select, .form-field textarea { font-family: var(--font-body); font-size: 14px; padding: 8px 10px; border: 1px solid #D7DBDE; border-radius: 6px; background: white; color: #1B1E20; }
.form-field input:focus, .form-field select:focus, .form-field textarea:focus { outline: 2px solid var(--azul-sinal); outline-offset: 1px; border-color: var(--azul-sinal); }
.form-field textarea { resize: vertical; min-height: 60px; }
.modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; padding-top: 16px; border-top: 1px solid #EEF0F1; }
.toast { position: fixed; bottom: 24px; right: 24px; background: var(--asfalto); color: white; padding: 12px 18px; border-radius: 8px; font-size: 13.5px; z-index: 200; box-shadow: 0 8px 24px rgba(0,0,0,.2); }
.toast.error { background: var(--vermelho-alerta); }
.toast.success { background: var(--verde-ok); }
.mobile-bar { display: none; }
@media (max-width: 900px) {
  .app-shell { grid-template-columns: 1fr; }
  .sidebar { display: none; }
  .sidebar.open { display: flex; position: fixed; inset: 0; z-index: 90; width: 100%; height: 100%; overflow-y: auto; }
  .mobile-bar { display: flex; align-items: center; justify-content: space-between; background: var(--asfalto); color: white; padding: 14px 18px; }
  .fleet-strip { grid-template-columns: repeat(2, 1fr); }
  .grid-2, .grid-4, .grid-5 { grid-template-columns: 1fr; }
  .form-grid { grid-template-columns: 1fr; }
  .main { padding: 20px 16px 60px 16px; }
}
button:focus-visible, .nav-item:focus-visible { outline: 2px solid var(--faixa); outline-offset: 2px; }
.hidden { display: none !important; }
.auth-screen { position: fixed; inset: 0; background: var(--asfalto); display: flex; align-items: center; justify-content: center; z-index: 500; padding: 20px; }
.auth-card { background: white; border-radius: 14px; width: 100%; max-width: 400px; padding: 34px 32px 28px 32px; }
.auth-brand { text-align: center; margin-bottom: 24px; }
.auth-brand .brand-title { color: #14171A; font-size: 32px; }
.auth-brand .brand-sub { color: #6B747B; }
.auth-card .form-field { margin-bottom: 14px; }
.auth-error { background: #F8DEDA; color: var(--vermelho-alerta); font-size: 13px; font-weight: 600; padding: 9px 12px; border-radius: 6px; margin-bottom: 14px; }
.auth-info { background: #FBF0D2; color: var(--faixa-escura); font-size: 12.5px; padding: 9px 12px; border-radius: 6px; margin-bottom: 14px; line-height: 1.4; }
.perm-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 12px; grid-column: 1 / -1; }
.perm-grid label { display: flex; align-items: center; gap: 7px; font-size: 13px; color: #24282B; font-weight: 500; cursor: pointer; }
.user-badge { font-size: 12px; color: var(--texto-claro); margin-bottom: 8px; }
.tab-bar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.tab-chip { padding: 8px 16px; border-radius: 20px; border: 1px solid #D7DBDE; background: white; font-size: 13.5px; font-weight: 600; color: #4A5259; cursor: pointer; }
.tab-chip:hover { background: #F2F3F4; }
.tab-chip.active { background: var(--asfalto); color: white; border-color: var(--asfalto); }

/* Refinamentos dos relatórios */
.abc-badge { display:inline-block; min-width:26px; text-align:center; padding:3px 9px; border-radius:20px; font-weight:700; font-size:12px; }
.abc-a { background: rgba(62,155,92,0.14); color:#2E7D46; }
.abc-b { background: rgba(242,183,5,0.18); color:#B98900; }
.abc-c { background: rgba(138,146,154,0.16); color:#5A6169; }
.rel-row-clic { cursor:pointer; transition: background 0.12s ease; }
.rel-row-clic:hover { background:#FBF6E6 !important; }
.rel-bar-track { flex:1; background:#EEF0F1; border-radius:5px; height:9px; min-width:70px; overflow:hidden; }
.rel-bar-fill { height:100%; border-radius:5px; transition: width 0.3s ease; }
.kpi-card-accent { position:relative; overflow:hidden; }
.tbl-clean tbody tr:last-child td { border-bottom:none; }
</style>
</head>
<body>

<div class="auth-screen" id="auth-screen">
  <div class="auth-card">
    <div class="auth-brand">
      <div class="brand-title">ZANCANARO</div>
      <div class="brand-sub">Gestão de Transportes</div>
    </div>
    <div id="auth-body"></div>
  </div>
</div>

<div class="mobile-bar hidden" id="mobile-bar">
  <strong>ZANCANARO</strong>
  <button class="btn btn-ghost btn-sm" id="btn-menu">Menu</button>
</div>

<div class="app-shell hidden" id="app-shell">
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="brand-title">ZANCANARO</div>
      <div class="brand-sub">Gestão de Transportes</div>
    </div>
    <nav class="nav" id="nav">
      <div class="nav-item active" data-view="dashboard"><span class="num">00</span> Painel</div>
      <div class="nav-item" data-view="vehicles"><span class="num">01</span> Veículos</div>
      <div class="nav-item" data-view="drivers"><span class="num">02</span> Motoristas</div>
      <div class="nav-item" data-view="deliveries"><span class="num">03</span> Entregas</div>
      <div class="nav-item" data-view="purchases"><span class="num">04</span> Compras</div>
      <div class="nav-item" data-view="documents"><span class="num">05</span> Documentos</div>
      <div class="nav-item" data-view="finance"><span class="num">06</span> Financeiro</div>
      <div class="nav-item" data-view="commercial"><span class="num">07</span> Vendas</div>
      <div class="nav-item" data-view="expenses"><span class="num">08</span> Outras Despesas</div>
      <div class="nav-item" data-view="suppliers"><span class="num">09</span> Fornecedores</div>
      <div class="nav-item" data-view="customers"><span class="num">10</span> Clientes</div>
      <div class="nav-item" data-view="reports"><span class="num">11</span> Relatórios</div>
      <div class="nav-item" data-view="users"><span class="num">12</span> Usuários</div>
    </nav>
    <div class="sidebar-footer">
      <div class="user-badge" id="user-badge"></div>
      <button class="btn btn-ghost btn-sm" id="btn-logout" style="color:var(--texto-suave);border-color:var(--linha);width:100%;">Sair</button>
      <div style="margin-top:10px;" id="frota-resumo">Dados salvos neste navegador</div>
    </div>
  </aside>
  <main class="main" id="main"></main>
</div>

<script>
/* ==================== CAMADA DE DADOS (localStorage) ==================== */
const PREFIX = 'frota_';

function dbGet(table) {
  const raw = localStorage.getItem(PREFIX + table);
  return raw ? JSON.parse(raw) : [];
}
function dbSet(table, items) {
  localStorage.setItem(PREFIX + table, JSON.stringify(items));
}
function nextId(table) {
  const key = PREFIX + 'seq_' + table;
  const n = parseInt(localStorage.getItem(key) || '0', 10) + 1;
  localStorage.setItem(key, String(n));
  return n;
}

const Store = {
  list(table) { return dbGet(table); },
  get(table, id) { return dbGet(table).find(x => x.id === Number(id)); },
  insert(table, obj) {
    const items = dbGet(table);
    obj.id = nextId(table);
    items.push(obj);
    dbSet(table, items);
    return obj;
  },
  update(table, id, patch) {
    const items = dbGet(table);
    const idx = items.findIndex(x => x.id === Number(id));
    if (idx === -1) return null;
    items[idx] = { ...items[idx], ...patch };
    dbSet(table, items);
    return items[idx];
  },
  remove(table, id) {
    dbSet(table, dbGet(table).filter(x => x.id !== Number(id)));
  }
};

/* Seed inicial — só roda uma vez */
if (!localStorage.getItem(PREFIX + 'seeded')) {
  for (let i = 1; i <= 5; i++) {
    Store.insert('vehicles', {
      placa: `AAA-100${i}`,
      modelo: `Veículo ${i} (editar modelo)`,
      ano: 2022,
      capacidade_kg: 3500,
      km_atual: 0,
      status: 'ativo',
      observacoes: ''
    });
  }
  localStorage.setItem(PREFIX + 'seeded', '1');
}

/* ==================== HELPERS ==================== */
const main = document.getElementById('main');
const nav = document.getElementById('nav');
const state = { vehicles: [], drivers: [] };

function fmtDate(d) {
  if (!d) return '—';
  const [y, m, day] = d.split('-');
  return `${day}/${m}/${y}`;
}
function fmtMoney(v) {
  return (v || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
}
function todayISO() { return new Date().toISOString().slice(0, 10); }

/* ==================== MÁSCARAS E FORMATAÇÃO DE CAMPOS ==================== */
function soDigitos(s) { return (s || '').replace(/\D/g, ''); }

function mascaraCpfCnpj(valor) {
  const d = soDigitos(valor).slice(0, 14);
  if (d.length <= 11) {
    // CPF: 000.000.000-00
    return d.replace(/^(\d{3})(\d)/, '$1.$2')
            .replace(/^(\d{3})\.(\d{3})(\d)/, '$1.$2.$3')
            .replace(/\.(\d{3})(\d)/, '.$1-$2');
  }
  // CNPJ: 00.000.000/0000-00
  return d.replace(/^(\d{2})(\d)/, '$1.$2')
          .replace(/^(\d{2})\.(\d{3})(\d)/, '$1.$2.$3')
          .replace(/\.(\d{3})(\d)/, '.$1/$2')
          .replace(/(\d{4})(\d)/, '$1-$2');
}
function mascaraTelefone(valor) {
  const d = soDigitos(valor).slice(0, 11);
  if (d.length <= 10) {
    // (00) 0000-0000
    return d.replace(/^(\d{2})(\d)/, '($1) $2').replace(/(\d{4})(\d)/, '$1-$2');
  }
  // (00) 00000-0000
  return d.replace(/^(\d{2})(\d)/, '($1) $2').replace(/(\d{5})(\d)/, '$1-$2');
}
function mascaraCep(valor) {
  return soDigitos(valor).slice(0, 8).replace(/^(\d{5})(\d)/, '$1-$2');
}
function mascaraPlaca(valor) {
  // remove tudo que não é letra/número, força maiúsculas, limita a 7 caracteres
  let v = (valor || '').toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 7);
  // Mercosul: 4ª posição é letra (AAA0A00) -> mantém junto ABC1D23
  // Antigo: 4ª posição é número (AAA0000) -> insere hífen ABC-1234
  if (v.length >= 5 && /^[A-Z]{3}[0-9]{4}$/.test(v)) {
    return v.replace(/^([A-Z]{3})([0-9]{4})$/, '$1-$2');
  }
  return v;
}
function emailValido(valor) {
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(valor);
}
function cpfValido(cpf) {
  cpf = soDigitos(cpf);
  if (cpf.length !== 11 || /^(\d)\1{10}$/.test(cpf)) return false;
  let s = 0;
  for (let i = 0; i < 9; i++) s += parseInt(cpf[i]) * (10 - i);
  let r = (s * 10) % 11; if (r === 10) r = 0;
  if (r !== parseInt(cpf[9])) return false;
  s = 0;
  for (let i = 0; i < 10; i++) s += parseInt(cpf[i]) * (11 - i);
  r = (s * 10) % 11; if (r === 10) r = 0;
  return r === parseInt(cpf[10]);
}
function cnpjValido(cnpj) {
  cnpj = soDigitos(cnpj);
  if (cnpj.length !== 14 || /^(\d)\1{13}$/.test(cnpj)) return false;
  const calc = (base) => {
    let tam = base.length, pos = tam - 7, soma = 0;
    for (let i = tam; i >= 1; i--) { soma += base[tam - i] * pos--; if (pos < 2) pos = 9; }
    const r = soma % 11;
    return r < 2 ? 0 : 11 - r;
  };
  const nums = cnpj.split('').map(Number);
  const d1 = calc(nums.slice(0, 12));
  if (d1 !== nums[12]) return false;
  const d2 = calc(nums.slice(0, 13));
  return d2 === nums[13];
}
function documentoValido(valor) {
  const d = soDigitos(valor);
  if (!d) return true; // vazio é permitido (campo opcional)
  if (d.length <= 11) return cpfValido(d);
  return cnpjValido(d);
}

// Delegação global: aplica máscara enquanto digita, conforme o data-mask do input
document.addEventListener('input', (e) => {
  const el = e.target;
  if (!el || !el.dataset || !el.dataset.mask) return;
  const pos = el.selectionEnd, antes = el.value.length;
  if (el.dataset.mask === 'cpfcnpj') el.value = mascaraCpfCnpj(el.value);
  else if (el.dataset.mask === 'telefone') el.value = mascaraTelefone(el.value);
  else if (el.dataset.mask === 'cep') el.value = mascaraCep(el.value);
  else if (el.dataset.mask === 'placa') el.value = mascaraPlaca(el.value);
  // reposiciona cursor aproximando pela diferença de tamanho
  const dif = el.value.length - antes;
  try { el.setSelectionRange(pos + dif, pos + dif); } catch (x) {}
});
// Validação visual ao sair do campo (email e documento)
document.addEventListener('blur', (e) => {
  const el = e.target;
  if (!el || !el.dataset) return;
  let invalido = false;
  if (el.dataset.valida === 'email' && el.value.trim()) invalido = !emailValido(el.value.trim());
  if (el.dataset.valida === 'documento' && el.value.trim()) invalido = !documentoValido(el.value);
  el.style.borderColor = invalido ? 'var(--vermelho-alerta)' : '';
  let dica = el.parentNode ? el.parentNode.querySelector('.campo-erro') : null;
  if (invalido) {
    if (!dica) {
      dica = document.createElement('div');
      dica.className = 'campo-erro';
      dica.style.cssText = 'color:var(--vermelho-alerta);font-size:11px;margin-top:3px;';
      el.parentNode.appendChild(dica);
    }
    dica.textContent = el.dataset.valida === 'email' ? 'E-mail inválido' : 'CPF/CNPJ inválido';
  } else if (dica) {
    dica.remove();
  }
}, true);
function diasAte(dataStr) {
  if (!dataStr) return null;
  const hoje = new Date(); hoje.setHours(0,0,0,0);
  const alvo = new Date(dataStr + 'T00:00:00');
  return Math.round((alvo - hoje) / 86400000);
}
function toast(msg, type = 'success') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3200);
}
function closeModal() {
  const overlay = document.querySelector('.modal-overlay');
  if (overlay) overlay.remove();
}
function openModal(title, bodyHtml, onSubmit) {
  closeModal();
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal">
      <h3 class="modal-title">${title}</h3>
      <form id="modal-form">
        <div class="form-grid">${bodyHtml}</div>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" id="modal-cancel">Cancelar</button>
          <button type="submit" class="btn btn-primary">Salvar</button>
        </div>
      </form>
    </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', (e) => { if (e.target === overlay) closeModal(); });
  document.getElementById('modal-cancel').addEventListener('click', closeModal);
  document.getElementById('modal-form').addEventListener('submit', (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    onSubmit(Object.fromEntries(fd.entries()));
  });
  // formata valores já preenchidos conforme a máscara do campo
  overlay.querySelectorAll('[data-mask]').forEach(el => {
    if (!el.value) return;
    if (el.dataset.mask === 'cpfcnpj') el.value = mascaraCpfCnpj(el.value);
    else if (el.dataset.mask === 'telefone') el.value = mascaraTelefone(el.value);
    else if (el.dataset.mask === 'cep') el.value = mascaraCep(el.value);
    else if (el.dataset.mask === 'placa') el.value = mascaraPlaca(el.value);
  });
  return overlay;
}
function optionsHtml(items, valueKey, labelFn, selected) {
  return items.map(i => `<option value="${i[valueKey]}" ${String(selected) === String(i[valueKey]) ? 'selected' : ''}>${labelFn(i)}</option>`).join('');
}

function loadBaseData() {
  state.vehicles = Store.list('vehicles');
  state.drivers = Store.list('drivers');
  atualizarResumoFrota();
}
function atualizarResumoFrota() {
  const el = document.getElementById('frota-resumo');
  if (!el) return;
  const veic = Store.list('vehicles');
  const n = veic.length;
  let txt;
  if (!n) {
    txt = 'Nenhum veículo cadastrado';
  } else {
    const caps = veic.map(v => Number(v.capacidade_kg) || 0);
    const iguais = caps.every(c => c === caps[0]);
    const capTxt = iguais
      ? caps[0].toLocaleString('pt-BR') + ' kg cada'
      : caps.reduce((a, b) => a + b, 0).toLocaleString('pt-BR') + ' kg no total';
    txt = 'Frota: ' + n + ' veículo' + (n > 1 ? 's' : '') + ' · ' + capTxt;
  }
  el.innerHTML = txt + '<br>Dados salvos neste navegador';
}

views.dashboard = function () {
  const vehicles = state.vehicles;
  const drivers = state.drivers;
  const maintenance = Store.list('maintenance');
  const deliveries = Store.list('deliveries');
  const documents = Store.list('documents');
  const fuel = Store.list('fuel');

  const resumo = {
    total_veiculos: vehicles.length,
    veiculos_ativos: vehicles.filter(v => v.status === 'ativo').length,
    total_motoristas: drivers.length,
    motoristas_ativos: drivers.filter(d => d.status === 'ativo').length,
  };

  const hoje = todayISO();
  const entregasHoje = deliveries.filter(d => d.data === hoje && d.status !== 'cancelada').map(d => ({
    ...d,
    placa: Store.get('vehicles', d.vehicle_id)?.placa,
    motorista_nome: Store.get('drivers', d.driver_id)?.nome
  }));

  const alertasManutencao = maintenance
    .filter(m => m.proxima_data)
    .map(m => ({ ...m, placa: Store.get('vehicles', m.vehicle_id)?.placa, dias_restantes: diasAte(m.proxima_data) }))
    .filter(m => m.dias_restantes !== null && m.dias_restantes <= 15)
    .sort((a, b) => a.dias_restantes - b.dias_restantes);

  const alertasDocumentos = documents
    .filter(d => d.validade)
    .map(d => {
      const label = d.entidade_tipo === 'veiculo'
        ? (Store.get('vehicles', d.entidade_id) ? `${Store.get('vehicles', d.entidade_id).placa} - ${Store.get('vehicles', d.entidade_id).modelo}` : '(veículo removido)')
        : (Store.get('drivers', d.entidade_id)?.nome || '(motorista removido)');
      return { ...d, entidade_label: label, dias_restantes: diasAte(d.validade) };
    })
    .filter(d => d.dias_restantes !== null && d.dias_restantes <= 30)
    .sort((a, b) => a.dias_restantes - b.dias_restantes);

  const mesAtual = hoje.slice(0, 7);
  const custoManutencaoMes = maintenance.filter(m => m.data && m.data.slice(0, 7) === mesAtual).reduce((s, m) => s + (Number(m.custo) || 0), 0);
  const custoCombustivelMes = fuel.filter(f => f.data && f.data.slice(0, 7) === mesAtual).reduce((s, f) => s + (Number(f.valor_total) || 0), 0);

  const fleetStrip = vehicles.map(v => `
    <div class="fleet-card status-${v.status}">
      <div class="fleet-plate">${v.placa}</div>
      <div class="fleet-model">${v.modelo}</div>
      <div class="fleet-meta">
        <span>${Math.round(v.km_atual).toLocaleString('pt-BR')} km</span>
        <span class="status-pill ${v.status}">${v.status}</span>
      </div>
    </div>
  `).join('');

  const alertTag = (dias) => dias < 0 ? `<span class="alert-tag vencido">VENCIDO</span>` : dias <= 7 ? `<span class="alert-tag urgente">${dias}d</span>` : `<span class="alert-tag ok">${dias}d</span>`;

  const manutRows = alertasManutencao.length
    ? alertasManutencao.map(m => `<div class="alert-row"><span>${m.placa || '—'} — ${m.descricao}</span>${alertTag(m.dias_restantes)}</div>`).join('')
    : `<div class="empty-state">Nenhuma manutenção próxima nos próximos 15 dias.</div>`;

  const docRows = alertasDocumentos.length
    ? alertasDocumentos.map(d => `<div class="alert-row"><span>${d.entidade_label} — ${d.tipo_doc}</span>${alertTag(d.dias_restantes)}</div>`).join('')
    : `<div class="empty-state">Nenhum documento vencendo nos próximos 30 dias.</div>`;

  const entregasRows = entregasHoje.length
    ? entregasHoje.map(e => `<div class="alert-row"><span>${e.placa || 'Sem veículo'} → ${e.destino} ${e.motorista_nome ? '· ' + e.motorista_nome : ''}</span><span class="status-pill ativo">${e.status.replace('_',' ')}</span></div>`).join('')
    : `<div class="empty-state">Nenhuma entrega agendada para hoje.</div>`;

  main.innerHTML = `
    <div class="page-header">
      <div>
        <h1 class="page-title">Painel</h1>
        <div class="page-sub">Visão geral da frota — ${new Date().toLocaleDateString('pt-BR', { weekday: 'long', day: '2-digit', month: 'long' })}</div>
      </div>
    </div>
    <div class="fleet-strip">${fleetStrip}</div>
    <div class="grid grid-4" style="margin-bottom:16px;">
      <div class="card"><p class="card-title">Veículos ativos</p><div class="kpi-value">${resumo.veiculos_ativos}/${resumo.total_veiculos}</div><div class="kpi-label">em operação</div></div>
      <div class="card"><p class="card-title">Motoristas ativos</p><div class="kpi-value">${resumo.motoristas_ativos}/${resumo.total_motoristas}</div><div class="kpi-label">disponíveis</div></div>
      <div class="card"><p class="card-title">Custo manutenção (mês)</p><div class="kpi-value" style="font-size:26px;">${fmtMoney(custoManutencaoMes)}</div></div>
      <div class="card"><p class="card-title">Custo combustível (mês)</p><div class="kpi-value" style="font-size:26px;">${fmtMoney(custoCombustivelMes)}</div></div>
    </div>
    <div class="grid grid-2">
      <div class="card"><p class="card-title">⚠ Manutenções próximas</p>${manutRows}</div>
      <div class="card"><p class="card-title">⚠ Documentos vencendo</p>${docRows}</div>
    </div>
    <div class="card" style="margin-top:16px;"><p class="card-title">Entregas de hoje</p>${entregasRows}</div>
  `;
};

      </select>

function openMaintenanceModal(record) {
  const isEdit = !!record;
  openModal(isEdit ? 'Editar manutenção' : 'Nova manutenção', maintenanceFormFields(record || {}), (payload) => {
    payload.vehicle_id = Number(payload.vehicle_id);
    payload.km = payload.km ? Number(payload.km) : null;
    payload.custo = payload.custo ? Number(payload.custo) : 0;
    payload.proxima_km = payload.proxima_km ? Number(payload.proxima_km) : null;
    const aPrazo = payload.pago === 'nao' && payload.custo > 0;
    const n = Math.min(12, Math.max(1, Number(payload.num_parcelas) || 1));
    const primeiro = payload.primeiro_vencimento || payload.data;
    payload.vencimento = primeiro;
    if (isEdit) {
      if (record.pago === 'parcelado') {
        payload.pago = 'parcelado';
        payload.vencimento = record.vencimento;
      }
      Store.update('maintenance', record.id, payload);
      if (record.pago === 'parcelado') {
        const antigas = Store.list('finance').filter(l => l.ref_tabela === 'maintenance' && l.ref_id === record.id)
          .sort((a, b) => (a.data || '').localeCompare(b.data || ''));
        const nAnt = antigas.length || 1;
        antigas.forEach(l => Store.remove('finance', l.id));
        const placa = (Store.get('vehicles', payload.vehicle_id) || {}).placa || '';
        gerarParcelas(payload.custo, nAnt, record.vencimento || payload.data, antigas).forEach(p => {
          Store.insert('finance', {
            tipo: 'despesa', origem: 'compra', ref_tabela: 'maintenance', ref_id: record.id,
            categoria: 'Manutenção', fornecedor: payload.oficina || '—',
            descricao: `${payload.oficina ? payload.oficina + ': ' : ''}${payload.descricao} — ${placa}${nAnt > 1 ? ` (parcela ${p.num}/${nAnt})` : ''}`,
            valor: p.valor, data: p.data, pago: p.pago, vehicle_id: payload.vehicle_id
          });
        });
        toast('Manutenção atualizada — parcelas recalculadas.');
      } else {
        toast('Manutenção atualizada.');
      }
    } else {
      if (aPrazo) payload.pago = 'parcelado';
      const rec = Store.insert('maintenance', payload);
      if (payload.km) {
        const v = Store.get('vehicles', payload.vehicle_id);
        if (v && payload.km > v.km_atual) Store.update('vehicles', v.id, { km_atual: payload.km });
      }
      if (aPrazo) {
        const placa = (Store.get('vehicles', payload.vehicle_id) || {}).placa || '';
        gerarParcelas(payload.custo, n, primeiro, null).forEach(p => {
          Store.insert('finance', {
            tipo: 'despesa', origem: 'compra', ref_tabela: 'maintenance', ref_id: rec.id,
            categoria: 'Manutenção', fornecedor: payload.oficina || '—',
            descricao: `${payload.oficina ? payload.oficina + ': ' : ''}${payload.descricao} — ${placa}${n > 1 ? ` (parcela ${p.num}/${n})` : ''}`,
            valor: p.valor, data: p.data, pago: 'nao', vehicle_id: payload.vehicle_id
          });
        });
        toast(n > 1 ? `Manutenção em ${n}x — contas a pagar geradas.` : 'Manutenção registrada — conta a pagar gerada.');
      } else {
        toast('Manutenção registrada.');
      }
    }
    closeModal();
    renderView('purchases');
  });
}

function openDeliveryModal(record) {
  const isEdit = !!record;
  openModal(isEdit ? 'Editar entrega' : 'Nova entrega', deliveryFormFields(record || {}), (payload) => {
    payload.vehicle_id = payload.vehicle_id ? Number(payload.vehicle_id) : null;
    payload.driver_id = payload.driver_id ? Number(payload.driver_id) : null;
    payload.peso_kg = payload.peso_kg ? Number(payload.peso_kg) : null;
    let aviso = null;
    if (payload.vehicle_id && payload.peso_kg) {
      const v = Store.get('vehicles', payload.vehicle_id);
      if (v && payload.peso_kg > v.capacidade_kg) aviso = `Atenção: carga de ${payload.peso_kg}kg excede a capacidade do veículo (${v.capacidade_kg}kg).`;
    }
    if (isEdit) { Store.update('deliveries', record.id, payload); toast('Entrega atualizada.'); }
    else { Store.insert('deliveries', payload); toast('Entrega cadastrada.'); }
    if (aviso) toast(aviso, 'error');
    closeModal();
    renderView('deliveries');
  });
}
const statusLabel = { agendada: 'Agendada', em_andamento: 'Em andamento', concluida: 'Concluída', cancelada: 'Cancelada' };
views.deliveries = function () {
  const records = Store.list('deliveries').map(e => ({
    ...e,
    placa: Store.get('vehicles', e.vehicle_id)?.placa,

  })).sort((a, b) => (b.data || '').localeCompare(a.data || ''));

  const rows = records.map(e => {
    const veh = Store.get('vehicles', e.vehicle_id);
    const overload = e.peso_kg && veh && e.peso_kg > veh.capacidade_kg;
    return `<tr>
      <td>${fmtDate(e.data)}</td>
      <td>${e.placa || '—'}</td>
      <td>${e.motorista_nome || '—'}</td>
      <td>${e.origem || '—'} → <strong>${e.destino}</strong></td>
      <td>${e.peso_kg ? e.peso_kg + ' kg' : '—'} ${overload ? '<span class="alert-tag vencido" title="Excede capacidade">⚠</span>' : ''}</td>
      <td><span class="status-pill ${e.status === 'concluida' ? 'ativo' : e.status === 'cancelada' ? 'inativo' : 'manutencao'}">${statusLabel[e.status]}</span></td>
      <td><div class="row-actions"><button class="btn btn-ghost btn-sm" data-edit="${e.id}">Editar</button><button class="btn btn-danger btn-sm" data-del="${e.id}">Excluir</button></div></td>

  main.innerHTML = `
    <div class="page-header">
      <div><h1 class="page-title">Entregas</h1><div class="page-sub">${records.length} registros</div></div>
      <button class="btn btn-accent" id="btn-new">+ Nova entrega</button>
    </div>
    <div class="table-wrap"><table>
      <thead><tr><th>Data</th><th>Veículo</th><th>Motorista</th><th>Rota</th><th>Carga</th><th>Status</th><th></th></tr></thead>

    </table></div>`;

  document.getElementById('btn-new').addEventListener('click', () => openDeliveryModal());

function fuelFormFields(f = {}) {
  return `
    <div class="form-field"><label>Veículo</label><select name="vehicle_id" required><option value="">Selecione…</option>${optionsHtml(state.vehicles, 'id', v => v.placa, f.vehicle_id)}</select></div>

    <div class="form-field"><label>Litros</label><input name="litros" type="number" step="0.01" value="${f.litros ?? ''}" required></div>
    <div class="form-field"><label>Valor total (R$)</label><input name="valor_total" type="number" step="0.01" value="${f.valor_total ?? ''}" required></div>
    <div class="form-field"><label>Odômetro (km)</label><input name="odometro" type="number" value="${f.odometro ?? ''}"></div>

    ${f.pago === 'parcelado' ? `
    <input type="hidden" name="pago" value="parcelado">

    ` : `
    <div class="form-field"><label>Pagamento</label>
      <select name="pago">
        <option value="sim" ${f.pago !== 'nao' ? 'selected' : ''}>À vista (pago)</option>
        <option value="nao" ${f.pago === 'nao' ? 'selected' : ''}>A prazo (gera contas a pagar)</option>
      </select>
    </div>
    <div class="form-field"><label>Nº de parcelas (1 a 12, se a prazo)</label><input name="num_parcelas" type="number" min="1" max="12" value="1"></div>
    <div class="form-field"><label>Vencimento (ou 1º vencimento)</label><input name="primeiro_vencimento" type="date" value="${f.vencimento || ''}"></div>
    `}`;
}
function openFuelModal(record) {
  const isEdit = !!record;
  openModal(isEdit ? 'Editar abastecimento' : 'Novo abastecimento', fuelFormFields(record || {}), (payload) => {
    payload.vehicle_id = Number(payload.vehicle_id);
    payload.driver_id = payload.driver_id ? Number(payload.driver_id) : null;
    payload.litros = Number(payload.litros);
    payload.valor_total = Number(payload.valor_total);
    payload.odometro = payload.odometro ? Number(payload.odometro) : null;
    const placa = (Store.get('vehicles', payload.vehicle_id) || {}).placa || '';
    const descParcela = (num, total) => `${payload.posto ? payload.posto + ': ' : ''}Combustível ${placa} (${payload.litros} L)${total > 1 ? ` (parcela ${num}/${total})` : ''}`;

    if (isEdit && record.pago === 'parcelado') {
      payload.pago = 'parcelado';
      payload.vencimento = record.vencimento;
      Store.update('fuel', record.id, payload);
      const antigas = Store.list('finance').filter(l => l.ref_tabela === 'fuel' && l.ref_id === record.id)
        .sort((a, b) => (a.data || '').localeCompare(b.data || ''));
      const n = antigas.length || 1;
      antigas.forEach(l => Store.remove('finance', l.id));
      gerarParcelas(payload.valor_total, n, record.vencimento || payload.data, antigas).forEach(p => {
        Store.insert('finance', {
          tipo: 'despesa', origem: 'compra', ref_tabela: 'fuel', ref_id: record.id,
          categoria: 'Combustível', fornecedor: payload.posto || '—',
          descricao: descParcela(p.num, n), valor: p.valor, data: p.data, pago: p.pago, vehicle_id: payload.vehicle_id
        });
      });
      toast('Abastecimento atualizado — parcelas recalculadas.');
    } else {
      const aPrazo = payload.pago === 'nao';
      const n = Math.min(12, Math.max(1, Number(payload.num_parcelas) || 1));
      const primeiro = payload.primeiro_vencimento || payload.data;
      payload.vencimento = primeiro;
      if (aPrazo) payload.pago = 'parcelado';
      let rec;
      if (isEdit) { Store.update('fuel', record.id, payload); rec = { id: record.id }; }
      else rec = Store.insert('fuel', payload);
      if (payload.odometro) {
        const v = Store.get('vehicles', payload.vehicle_id);
        if (v && payload.odometro > v.km_atual) Store.update('vehicles', v.id, { km_atual: payload.odometro });
      }
      if (aPrazo) {
        gerarParcelas(payload.valor_total, n, primeiro, null).forEach(p => {
          Store.insert('finance', {
            tipo: 'despesa', origem: 'compra', ref_tabela: 'fuel', ref_id: rec.id,
            categoria: 'Combustível', fornecedor: payload.posto || '—',
            descricao: descParcela(p.num, n), valor: p.valor, data: p.data, pago: 'nao', vehicle_id: payload.vehicle_id
          });
        });
        toast(n > 1 ? `Abastecimento em ${n}x — contas a pagar geradas.` : 'Abastecimento registrado — conta a pagar gerada.');
      } else {
        toast(isEdit ? 'Abastecimento atualizado.' : 'Abastecimento registrado.');
      }
    }
    closeModal();
    renderView('purchases');
  });
}

    <div class="form-field full"><label>Observações</label><textarea name="observacoes">${c.observacoes || ''}</textarea></div>`;

function openPurchaseModal(compra) {
  const isEdit = !!(compra && compra.id);
  openModal(isEdit ? 'Editar compra' : 'Nova compra', purchaseFormFields(compra || {}), (payload) => {
    const valor = Number(payload.valor);
    const n = Math.min(12, Math.max(1, Number(payload.num_parcelas) || 1));
    const parcelas = gerarParcelas(valor, n, payload.primeiro_vencimento, isEdit ? compra._irmas : null);
    const grupo = isEdit ? (compra._irmas[0].grupo || 'cg' + Date.now()) : 'cg' + Date.now();
    if (isEdit) compra._irmas.forEach(l => Store.remove('finance', l.id));
    parcelas.forEach(p => {
      Store.insert('finance', {
        tipo: 'despesa', origem: 'compra', grupo, categoria: payload.categoria,
        fornecedor: payload.fornecedor,
        descricao: `${payload.fornecedor}: ${payload.descricao}${n > 1 ? ` (parcela ${p.num}/${n})` : ''}`,
        valor: p.valor, data: p.data,
        pago: isEdit ? p.pago : (n > 1 ? 'nao' : payload.pago),
        vehicle_id: payload.vehicle_id ? Number(payload.vehicle_id) : null,
        observacoes: payload.observacoes || ''
      });
    });
    toast(isEdit
      ? 'Compra atualizada — parcelas recalculadas.'
      : (n > 1 ? `Compra lançada em ${n}x de ${fmtMoney(parcelas[0].valor)}.` : (payload.pago === 'nao' ? 'Compra lançada — conta a pagar gerada.' : 'Compra lançada.')));
    closeModal();
    renderView('purchases');
  });
}

function situacaoPgtoTag(pago, venc) {
  if (pago === 'parcelado') return '<span class="status-pill manutencao">Parcelado</span>';
  if (pago !== 'nao') return '<span class="status-pill ativo">Pago</span>';
  const d = diasAte(venc);
  if (d !== null && d < 0) return `<span class="alert-tag vencido">Vencida há ${Math.abs(d)}d</span>`;
  if (d !== null && d <= 7) return `<span class="alert-tag urgente">${d}d</span>`;
  return '<span class="status-pill manutencao">A pagar</span>';
}

views.purchases = function (tab) {
  if (tab) purchasesTab = tab;
  tab = purchasesTab;

  const fuel = Store.list('fuel');
  const maint = Store.list('maintenance');
  const gerais = Store.list('finance').filter(l => l.origem === 'compra');

  const parcelasVinc = (tabela) => gerais.filter(l => l.ref_tabela === tabela && l.pago === 'nao').reduce((s, l) => s + Number(l.valor), 0);
  const pendFuel = fuel.filter(f => f.pago === 'nao').reduce((s, f) => s + Number(f.valor_total), 0) + parcelasVinc('fuel');
  const pendMaint = maint.filter(m => m.pago === 'nao' && Number(m.custo) > 0).reduce((s, m) => s + Number(m.custo), 0) + parcelasVinc('maintenance');
  const pendGerais = gerais.filter(l => l.pago === 'nao' && !l.ref_tabela).reduce((s, l) => s + Number(l.valor), 0);
  const totalPend = pendFuel + pendMaint + pendGerais;

  const mesAtual = todayISO().slice(0, 7);
  const comprasMes = fuel.filter(f => f.data && f.data.slice(0, 7) === mesAtual).reduce((s, f) => s + Number(f.valor_total), 0)
    + maint.filter(m => m.data && m.data.slice(0, 7) === mesAtual).reduce((s, m) => s + (Number(m.custo) || 0), 0)
    + gerais.filter(l => l.data && l.data.slice(0, 7) === mesAtual).reduce((s, l) => s + Number(l.valor), 0);

  const chip = (key, label) => `<button class="tab-chip ${tab === key ? 'active' : ''}" data-tab="${key}">${label}</button>`;

  let btnLabel, contentHtml;

  if (tab === 'fuel') {
    btnLabel = '+ Novo abastecimento';
    const records = fuel.map(f => ({
      ...f,

      <tr>
        <td>${fmtDate(f.data)}</td>
        <td><strong>${f.placa || '—'}</strong></td>

        <td><div class="row-actions">

      <thead><tr><th>Data</th><th>Veículo</th><th>Motorista</th><th>Litros</th><th>Valor</th><th>R$/L</th><th>Situação</th><th></th></tr></thead>

    <div class="table-wrap"><table>
      <thead><tr><th>Vencimento</th><th>Fornecedor</th><th>Categoria</th><th>Descrição</th><th>Veículo</th><th>Valor</th><th>Situação</th><th></th></tr></thead>
      <tbody>${rows || `<tr><td colspan="8" class="empty-state">Nenhuma compra registrada. Dá para parcelar em até 12x.</td></tr>`}</tbody>
    </table></div>`;
  }

  main.innerHTML = `
    <div class="page-header">
      <div><h1 class="page-title">Compras</h1><div class="page-sub">Combustível, manutenção e compras gerais — geram contas a pagar</div></div>
      <button class="btn btn-accent" id="btn-new">${btnLabel}</button>
    </div>

    <div class="grid grid-4" style="margin-bottom:16px;">
      <div class="card"><p class="card-title">Compras do mês</p><div class="kpi-value" style="font-size:24px;">${fmtMoney(comprasMes)}</div></div>
      <div class="card"><p class="card-title">A pagar — Combustível</p><div class="kpi-value" style="font-size:24px;color:var(--faixa-escura);">${fmtMoney(pendFuel)}</div></div>
      <div class="card"><p class="card-title">A pagar — Manutenção</p><div class="kpi-value" style="font-size:24px;color:var(--faixa-escura);">${fmtMoney(pendMaint)}</div></div>
      <div class="card"><p class="card-title">A pagar — Total</p><div class="kpi-value" style="font-size:24px;color:var(--vermelho-alerta);">${fmtMoney(totalPend)}</div><div class="kpi-label">inclui compras gerais</div></div>
    </div>

    <div class="tab-bar">
      ${chip('fuel', '⛽ Combustível')}
      ${chip('maintenance', '🔧 Manutenção')}
      ${chip('general', '🛒 Compras Gerais')}
    </div>

    ${contentHtml}`;

  main.querySelectorAll('[data-tab]').forEach(btn => btn.addEventListener('click', () => views.purchases(btn.dataset.tab)));
  document.getElementById('btn-new').addEventListener('click', () => {
    if (tab === 'fuel') openFuelModal();
    else if (tab === 'maintenance') openMaintenanceModal();
    else openPurchaseModal();
  });

  main.querySelectorAll('[data-pagar-fuel]').forEach(btn => btn.addEventListener('click', () => {
    Store.update('fuel', btn.dataset.pagarFuel, { pago: 'sim' });
    toast('Pagamento registrado.');
    views.purchases('fuel');
  }));
  main.querySelectorAll('[data-edit-fuel]').forEach(btn => btn.addEventListener('click', () => {
    openFuelModal(Store.list('fuel').find(x => x.id == btn.dataset.editFuel));
  }));
  main.querySelectorAll('[data-del-fuel]').forEach(btn => btn.addEventListener('click', () => {
    if (!confirm('Excluir esta compra de combustível? As parcelas dela saem do Financeiro e do Fluxo de Caixa.')) return;
    const id = Number(btn.dataset.delFuel);
    Store.list('finance').filter(l => l.ref_tabela === 'fuel' && l.ref_id === id).forEach(l => Store.remove('finance', l.id));
    Store.remove('fuel', id);
    toast('Registro excluído.');
    views.purchases('fuel');
  }));
  main.querySelectorAll('[data-pagar-maint]').forEach(btn => btn.addEventListener('click', () => {
    Store.update('maintenance', btn.dataset.pagarMaint, { pago: 'sim' });
    toast('Pagamento registrado.');
    views.purchases('maintenance');
  }));
  main.querySelectorAll('[data-edit-maint]').forEach(btn => btn.addEventListener('click', () => {
    openMaintenanceModal(Store.list('maintenance').find(x => x.id == btn.dataset.editMaint));
  }));
  main.querySelectorAll('[data-del-maint]').forEach(btn => btn.addEventListener('click', () => {
    if (!confirm('Excluir esta compra de manutenção? As parcelas dela saem do Financeiro e do Fluxo de Caixa.')) return;
    const id = Number(btn.dataset.delMaint);
    Store.list('finance').filter(l => l.ref_tabela === 'maintenance' && l.ref_id === id).forEach(l => Store.remove('finance', l.id));
    Store.remove('maintenance', id);
    toast('Registro excluído.');
    views.purchases('maintenance');
  }));
  main.querySelectorAll('[data-pagar-fin]').forEach(btn => btn.addEventListener('click', () => {
    Store.update('finance', btn.dataset.pagarFin, { pago: 'sim' });
    toast('Pagamento registrado.');
    views.purchases('general');
  }));
  main.querySelectorAll('[data-edit-compra]').forEach(btn => btn.addEventListener('click', () => {
    const alvo = Store.list('finance').find(x => x.id == btn.dataset.editCompra);
    if (!alvo) return;
    const irmas = (alvo.grupo ? Store.list('finance').filter(l => l.grupo === alvo.grupo) : [alvo])
      .sort((a, b) => (a.data || '').localeCompare(b.data || ''));
    let base = (irmas[0].descricao || '').replace(/ \(parcela \d+\/\d+\)$/, '');
    if (alvo.fornecedor && base.startsWith(alvo.fornecedor + ': ')) base = base.slice(alvo.fornecedor.length + 2);
    openPurchaseModal({
      id: alvo.id, _irmas: irmas,
      fornecedor: alvo.fornecedor, categoria: alvo.categoria, descricao: base,
      vehicle_id: alvo.vehicle_id,
      valor: Math.round(irmas.reduce((s, l) => s + Number(l.valor), 0) * 100) / 100,
      num_parcelas: irmas.length, primeiro_vencimento: irmas[0].data,
      observacoes: alvo.observacoes
    });
  }));
  main.querySelectorAll('[data-edit-fin]').forEach(btn => btn.addEventListener('click', () => {
    openFinanceModal(Store.list('finance').find(x => x.id == btn.dataset.editFin));
  }));
  main.querySelectorAll('[data-del-fin]').forEach(btn => btn.addEventListener('click', () => {
    const alvo = Store.list('finance').find(x => x.id == btn.dataset.delFin);
    if (!alvo) return;
    const irmas = alvo.grupo
      ? Store.list('finance').filter(l => l.grupo === alvo.grupo)
      : (alvo.ref_tabela ? Store.list('finance').filter(l => l.ref_tabela === alvo.ref_tabela && l.ref_id === alvo.ref_id) : [alvo]);
    const msg = irmas.length > 1
      ? `Excluir esta compra? Todas as ${irmas.length} parcelas dela serão removidas do Financeiro e do Fluxo de Caixa.`
      : 'Excluir esta compra? O lançamento sai do Financeiro e do Fluxo de Caixa.';
    if (!confirm(msg)) return;
    irmas.forEach(l => Store.remove('finance', l.id));
    if (alvo.ref_tabela === 'fuel') Store.remove('fuel', alvo.ref_id);
    if (alvo.ref_tabela === 'maintenance') Store.remove('maintenance', alvo.ref_id);
    toast(irmas.length > 1 ? 'Compra e parcelas excluídas.' : 'Compra excluída.');
    views.purchases('general');
  }));
};

function documentFormFields(doc = {}) {
  const entidades = doc.entidade_tipo === 'motorista' ? state.drivers : state.vehicles;
  return `
    <div class="form-field"><label>Tipo de entidade</label>
      <select name="entidade_tipo" id="doc-tipo">
        <option value="veiculo" ${doc.entidade_tipo === 'veiculo' || !doc.entidade_tipo ? 'selected' : ''}>Veículo</option>
        <option value="motorista" ${doc.entidade_tipo === 'motorista' ? 'selected' : ''}>Motorista</option>
      </select>
    </div>
    <div class="form-field"><label>Entidade</label>
      <select name="entidade_id" id="doc-entidade">${optionsHtml(entidades, 'id', e => e.placa ? `${e.placa} — ${e.modelo}` : e.nome, doc.entidade_id)}</select>
    </div>
    <div class="form-field"><label>Tipo de documento</label><input name="tipo_doc" value="${doc.tipo_doc || ''}" required placeholder="Ex: CRLV, Seguro, CNH, ANTT"></div>
    <div class="form-field"><label>Número</label><input name="numero" value="${doc.numero || ''}"></div>
    <div class="form-field"><label>Emissão</label><input name="emissao" type="date" value="${doc.emissao || ''}"></div>
    <div class="form-field"><label>Validade</label><input name="validade" type="date" value="${doc.validade || ''}"></div>
    <div class="form-field full"><label>Observações</label><textarea name="observacoes">${doc.observacoes || ''}</textarea></div>`;
}
function openDocumentModal(record) {
  const isEdit = !!record;
  const overlay = openModal(isEdit ? 'Editar documento' : 'Novo documento', documentFormFields(record || {}), (payload) => {
    payload.entidade_id = Number(payload.entidade_id);
    if (isEdit) { Store.update('documents', record.id, payload); toast('Documento atualizado.'); }
    else { Store.insert('documents', payload); toast('Documento cadastrado.'); }
    closeModal();
    renderView('documents');
  });
  const tipoSelect = overlay.querySelector('#doc-tipo');
  const entidadeSelect = overlay.querySelector('#doc-entidade');
  tipoSelect.addEventListener('change', () => {
    const list = tipoSelect.value === 'motorista' ? state.drivers : state.vehicles;
    entidadeSelect.innerHTML = optionsHtml(list, 'id', e => e.placa ? `${e.placa} — ${e.modelo}` : e.nome);
  });
}
views.documents = function () {
  const records = Store.list('documents').map(d => {
    const label = d.entidade_tipo === 'veiculo'
      ? (Store.get('vehicles', d.entidade_id) ? `${Store.get('vehicles', d.entidade_id).placa} - ${Store.get('vehicles', d.entidade_id).modelo}` : '(veículo removido)')
      : (Store.get('drivers', d.entidade_id)?.nome || '(motorista removido)');
    return { ...d, entidade_label: label };
  }).sort((a, b) => (a.validade || '').localeCompare(b.validade || ''));

  const alertTag = (dias) => {
    if (dias === null) return '—';
    if (dias < 0) return `<span class="alert-tag vencido">Vencido há ${Math.abs(dias)}d</span>`;
    if (dias <= 30) return `<span class="alert-tag urgente">${dias}d restantes</span>`;
    return `<span class="alert-tag ok">${dias}d restantes</span>`;
  };

  const rows = records.map(d => `
    <tr>
      <td>${d.entidade_tipo === 'veiculo' ? '🚚' : '👤'} ${d.entidade_label}</td>
      <td>${d.tipo_doc}</td>
      <td>${d.numero || '—'}</td>
      <td>${fmtDate(d.validade)}</td>
      <td>${alertTag(diasAte(d.validade))}</td>
      <td><div class="row-actions"><button class="btn btn-ghost btn-sm" data-edit="${d.id}">Editar</button><button class="btn btn-danger btn-sm" data-del="${d.id}">Excluir</button></div></td>
    </tr>`).join('');

  main.innerHTML = `
    <div class="page-header">
      <div><h1 class="page-title">Documentação</h1><div class="page-sub">${records.length} documentos cadastrados</div></div>
      <button class="btn btn-accent" id="btn-new">+ Novo documento</button>
    </div>
    <div class="table-wrap"><table>
      <thead><tr><th>Entidade</th><th>Documento</th><th>Número</th><th>Validade</th><th>Status</th><th></th></tr></thead>
      <tbody>${rows || `<tr><td colspan="6" class="empty-state">Nenhum documento cadastrado.</td></tr>`}</tbody>
    </table></div>`;

  document.getElementById('btn-new').addEventListener('click', () => openDocumentModal());
  main.querySelectorAll('[data-edit]').forEach(btn => btn.addEventListener('click', () => openDocumentModal(records.find(x => x.id == btn.dataset.edit))));
  main.querySelectorAll('[data-del]').forEach(btn => btn.addEventListener('click', () => {
    if (!confirm('Excluir este documento?')) return;
    Store.remove('documents', btn.dataset.del);
    toast('Documento excluído.');
    renderView('documents');
  }));
};

/* ==================== FINANCEIRO ==================== */
const CATEGORIAS_RECEITA = ['Frete', 'Serviço', 'Venda', 'Outros'];
const CATEGORIAS_DESPESA = ['Financiamento', 'Consórcio', 'Salários', 'Pedágio', 'Seguro', 'Impostos', 'Pneus', 'Peças', 'Aluguel', 'Multas', 'Outros'];

function financeFormFields(l = {}) {
  const isReceita = l.tipo === 'receita';
  return `
    <div class="form-field"><label>Tipo</label>
      <select name="tipo" id="fin-tipo">
        <option value="receita" ${isReceita ? 'selected' : ''}>Receita</option>
        <option value="despesa" ${l.tipo === 'despesa' ? 'selected' : ''}>Despesa</option>
      </select>
    </div>
    <div class="form-field"><label>Categoria</label>
      <select name="categoria" id="fin-categoria">
        ${(isReceita ? CATEGORIAS_RECEITA : CATEGORIAS_DESPESA).map(c => `<option value="${c}" ${l.categoria === c ? 'selected' : ''}>${c}</option>`).join('')}
      </select>
    </div>
    <div class="form-field full"><label>Descrição</label><input name="descricao" value="${l.descricao || ''}" required placeholder="Ex: Frete Curitiba → Matinhos"></div>
    <div class="form-field"><label>Valor (R$)</label><input name="valor" type="number" step="0.01" min="0" value="${l.valor ?? ''}" required></div>

        <option value="sim" ${l.pago === 'sim' ? 'selected' : ''}>Pago / Recebido</option>

      </select>

    <div class="form-field"><label>Veículo (opcional)</label>
      <select name="vehicle_id"><option value="">—</option>${optionsHtml(state.vehicles, 'id', v => v.placa, l.vehicle_id)}</select>
    </div>
    <div class="form-field full"><label>Observações</label><textarea name="observacoes">${l.observacoes || ''}</textarea></div>`;
}

function openFinanceModal(record, tipoInicial) {
  const isEdit = !!record;
  const base = record || (tipoInicial ? { tipo: tipoInicial } : {});
  const overlay = openModal(isEdit ? 'Editar lançamento' : 'Novo lançamento', financeFormFields(base), (payload) => {
    payload.valor = Number(payload.valor);
    payload.vehicle_id = payload.vehicle_id ? Number(payload.vehicle_id) : null;
    if (isEdit) { Store.update('finance', record.id, payload); toast('Lançamento atualizado.'); }
    else { Store.insert('finance', payload); toast('Lançamento registrado.'); }
    closeModal();
    renderView(['expenses', 'purchases'].includes(viewAtual) ? viewAtual : 'finance');
  });
  const tipoSelect = overlay.querySelector('#fin-tipo');
  const catSelect = overlay.querySelector('#fin-categoria');
  tipoSelect.addEventListener('change', () => {
    const cats = tipoSelect.value === 'receita' ? CATEGORIAS_RECEITA : CATEGORIAS_DESPESA;
    catSelect.innerHTML = cats.map(c => `<option value="${c}">${c}</option>`).join('');
  });
}

function mesLabel(ym) {
  const [y, m] = ym.split('-');
  const nomes = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
  return `${nomes[Number(m) - 1]} de ${y}`;
}

let financeTab = 'lancamentos';
views.finance = function (mesSelecionado) {
  if (financeTab === 'fluxo') { renderFluxoCaixa(); return; }
  if (financeTab === 'analise') { renderAnaliseFinanceira(); return; }
  const mes = mesSelecionado || todayISO().slice(0, 7);

  const lancamentos = Store.list('finance');
  const fuel = Store.list('fuel');
  const maintenance = Store.list('maintenance');
  const vendas = Store.list('sales');

  // Lançamentos manuais do mês
  const doMes = lancamentos.filter(l => l.data && l.data.slice(0, 7) === mes);

  // Receitas automáticas: parcelas recebidas de fretes fechados/concluídos, com vencimento no mês
  const autoReceitas = [];
  vendas.filter(s => s.status === 'fechado' || s.status === 'concluido').forEach(s => {
    const parcelas = getParcelas(s);
    parcelas.filter(p => p.pago === 'sim' && p.data && p.data.slice(0, 7) === mes).forEach(p => {
      autoReceitas.push({
        auto: true, origem: 'Frete (Vendas)', data: p.data,
        descricao: `${s.cliente} — ${s.origem ? s.origem + ' → ' : ''}${s.destino}${parcelas.length > 1 ? ` (parcela ${p.num}/${parcelas.length})` : ''}`,
        valor: p.valor
      });
    });
  });

  // Despesas automáticas vindas dos outros módulos (só as do mês)
  const autoDespesas = [
    ...fuel.filter(f => f.data && f.data.slice(0, 7) === mes && f.pago !== 'parcelado').map(f => ({
      auto: true, origem: 'Combustível', data: f.data,
      descricao: `Abastecimento ${Store.get('vehicles', f.vehicle_id)?.placa || ''} (${f.litros} L${f.posto ? ' · ' + f.posto : ''})`,
      valor: Number(f.valor_total) || 0
    })),
    ...maintenance.filter(m => m.data && m.data.slice(0, 7) === mes && Number(m.custo) > 0 && m.pago !== 'parcelado').map(m => ({
      auto: true, origem: 'Manutenção', data: m.data,
      descricao: `${m.descricao} — ${Store.get('vehicles', m.vehicle_id)?.placa || ''}`,
      valor: Number(m.custo) || 0
    }))
  ];

  const receitas = doMes.filter(l => l.tipo === 'receita');
  const despesasManuais = doMes.filter(l => l.tipo === 'despesa');

  const totalReceitasManuais = receitas.reduce((s, l) => s + Number(l.valor), 0);
  const totalReceitasAuto = autoReceitas.reduce((s, l) => s + l.valor, 0);
  const totalReceitas = totalReceitasManuais + totalReceitasAuto;
  const totalDespesasManuais = despesasManuais.reduce((s, l) => s + Number(l.valor), 0);
  const totalAuto = autoDespesas.reduce((s, l) => s + l.valor, 0);
  const totalDespesas = totalDespesasManuais + totalAuto;
  const saldo = totalReceitas - totalDespesas;

  // Pendências: lançamentos manuais não quitados + fretes fechados a receber
  const pendentesFinance = lancamentos.filter(l => l.pago === 'nao')
    .map(l => ({ ...l, dias: diasAte(l.data) }));
  const pendentesVendas = [];
  vendas.filter(s => s.status === 'fechado' || s.status === 'concluido').forEach(s => {
    const parcelas = getParcelas(s);
    parcelas.filter(p => p.pago === 'nao').forEach(p => {
      pendentesVendas.push({
        tipo: 'receita',
        descricao: `Frete: ${s.cliente} — ${s.destino}${parcelas.length > 1 ? ` (parcela ${p.num}/${parcelas.length})` : ''}`,
        valor: p.valor, data: p.data, dias: diasAte(p.data)
      });
    });
  });
  const pendentesCompras = [];
  fuel.filter(f => f.pago === 'nao').forEach(f => {
    const venc = f.vencimento || f.data;
    pendentesCompras.push({ tipo: 'despesa', descricao: `Combustível ${(Store.get('vehicles', f.vehicle_id) || {}).placa || ''} (${f.litros} L)`, valor: Number(f.valor_total), data: venc, dias: diasAte(venc) });
  });
  maintenance.filter(m => m.pago === 'nao' && Number(m.custo) > 0).forEach(m => {
    const venc = m.vencimento || m.data;
    pendentesCompras.push({ tipo: 'despesa', descricao: `${m.descricao} — ${(Store.get('vehicles', m.vehicle_id) || {}).placa || ''}`, valor: Number(m.custo), data: venc, dias: diasAte(venc) });
  });
  const pendentes = [...pendentesFinance, ...pendentesVendas, ...pendentesCompras]
    .sort((a, b) => (a.data || '').localeCompare(b.data || ''));

  const pendTag = (dias) => {
    if (dias === null) return '';
    if (dias < 0) return `<span class="alert-tag vencido">Venceu há ${Math.abs(dias)}d</span>`;
    if (dias <= 7) return `<span class="alert-tag urgente">${dias}d</span>`;
    return `<span class="alert-tag ok">${dias}d</span>`;
  };

  const pendRows = pendentes.length
    ? pendentes.map(l => `
        <div class="alert-row">
          <span>${l.tipo === 'receita' ? '↑' : '↓'} ${l.descricao} — <strong>${fmtMoney(l.valor)}</strong> (${fmtDate(l.data)})</span>
          ${pendTag(l.dias)}
        </div>`).join('')
    : `<div class="empty-state">Nenhuma conta pendente.</div>`;

  // Tabela unificada do mês: manuais + automáticas (despesas de frota e receitas de frete)
  const linhas = [
    ...doMes.map(l => ({ ...l, isAuto: false })),
    ...autoDespesas.map(l => ({ ...l, tipo: 'despesa', categoria: l.origem, pago: 'sim', isAuto: true })),
    ...autoReceitas.map(l => ({ ...l, tipo: 'receita', categoria: l.origem, pago: 'sim', isAuto: true }))
  ].sort((a, b) => (b.data || '').localeCompare(a.data || ''));

  const rows = linhas.map(l => `
    <tr>
      <td>${fmtDate(l.data)}</td>
      <td><span class="status-pill ${l.tipo === 'receita' ? 'ativo' : 'inativo'}">${l.tipo === 'receita' ? 'Receita' : 'Despesa'}</span></td>
      <td>${l.categoria || '—'}${l.isAuto ? ' <span style="font-size:10px;color:#8A929A;">(automático)</span>' : ''}</td>
      <td>${l.descricao}</td>
      <td style="font-weight:600;color:${l.tipo === 'receita' ? 'var(--verde-ok)' : 'var(--vermelho-alerta)'};">${l.tipo === 'receita' ? '+' : '−'} ${fmtMoney(l.valor)}</td>
      <td>${l.isAuto ? '—' : `<span class="status-pill ${l.pago === 'sim' ? 'ativo' : 'manutencao'}">${l.pago === 'sim' ? 'Pago' : 'Pendente'}</span>`}</td>
      <td>${l.isAuto ? '' : `<div class="row-actions"><button class="btn btn-ghost btn-sm" data-edit="${l.id}">Editar</button><button class="btn btn-danger btn-sm" data-del="${l.id}">Excluir</button></div>`}</td>
    </tr>`).join('');

  // Navegação de meses
  const [y, m] = mes.split('-').map(Number);
  const mesAnterior = m === 1 ? `${y - 1}-12` : `${y}-${String(m - 1).padStart(2, '0')}`;
  const mesSeguinte = m === 12 ? `${y + 1}-01` : `${y}-${String(m + 1).padStart(2, '0')}`;

  main.innerHTML = `
    <div class="page-header">
      <div><h1 class="page-title">Financeiro</h1><div class="page-sub">Receitas, despesas e contas pendentes</div></div>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-primary" id="btn-new-receita">+ Receita</button>
        <button class="btn btn-accent" id="btn-new-despesa">+ Despesa</button>
      </div>
    </div>

    <div class="tab-bar">
      <button class="tab-chip active" data-fintab="lancamentos">📒 Lançamentos</button>
      <button class="tab-chip" data-fintab="fluxo">💰 Fluxo de Caixa</button>
      <button class="tab-chip" data-fintab="analise">📊 Análise</button>
    </div>

function gerarParcelas(valorTotal, n, primeiraData, existentes) {
  const parcelas = [];
  const base = Math.floor((valorTotal / n) * 100) / 100;
  let acumulado = 0;
  const [py, pm, pd] = primeiraData.split('-').map(Number);
  for (let i = 0; i < n; i++) {
    const valor = i === n - 1 ? Math.round((valorTotal - acumulado) * 100) / 100 : base;
    acumulado += valor;
    const dt = new Date(py, pm - 1 + i, pd);
    const dataStr = `${dt.getFullYear()}-${String(dt.getMonth() + 1).padStart(2, '0')}-${String(dt.getDate()).padStart(2, '0')}`;
    parcelas.push({ num: i + 1, data: dataStr, valor, pago: (existentes && existentes[i]) ? existentes[i].pago : 'nao' });
  }
  return parcelas;
}

function getParcelas(s) {
  if (s.parcelas && s.parcelas.length) return s.parcelas;
  const v = (s.valor_total != null) ? Number(s.valor_total) : Number(s.valor);
  return [{ num: 1, data: s.data, valor: v, pago: s.pago || 'nao' }];
}

function marcarParcelaRecebida(saleId, num) {
  const s = Store.get('sales', saleId);
  if (!s) return;
  const parcelas = getParcelas(s).map(p => p.num === Number(num) ? { ...p, pago: 'sim' } : p);
  const todasPagas = parcelas.every(p => p.pago === 'sim');
  Store.update('sales', saleId, { parcelas, pago: todasPagas ? 'sim' : 'nao' });
}

function openSaleModal(record) {
  const isEdit = !!record;
  const overlay = openModal(isEdit ? 'Editar venda de frete' : 'Nova venda de frete', saleFormFields(record || {}), (payload) => {
    payload.valor = Number(payload.valor) || 0;
    payload.qtd_ajudantes = Math.max(0, Number(payload.qtd_ajudantes) || 0);
    payload.valor_ajudante = Number(payload.valor_ajudante) || 0;
    payload.valor_ajudantes_total = payload.qtd_ajudantes * payload.valor_ajudante;
    payload.valor_total = payload.valor + payload.valor_ajudantes_total;
    payload.qtd_entregas = Math.max(1, Number(payload.qtd_entregas) || 1);
    payload.valor_por_entrega = payload.valor / payload.qtd_entregas;
    payload.peso_kg = payload.peso_kg ? Number(payload.peso_kg) : null;
    payload.num_parcelas = Math.max(1, Number(payload.num_parcelas) || 1);
    payload.primeiro_vencimento = payload.primeiro_vencimento || payload.data;
    const existentes = isEdit && record.parcelas && record.parcelas.length === payload.num_parcelas ? record.parcelas : null;
    payload.parcelas = gerarParcelas(payload.valor_total, payload.num_parcelas, payload.primeiro_vencimento, existentes);
    if (payload.pago === 'sim') payload.parcelas.forEach(p => p.pago = 'sim');
    else payload.pago = payload.parcelas.every(p => p.pago === 'sim') ? 'sim' : 'nao';
    if (isEdit) { Store.update('sales', record.id, payload); toast('Venda atualizada.'); }
    else { Store.insert('sales', payload); toast(payload.num_parcelas > 1 ? `Venda registrada em ${payload.num_parcelas}x.` : 'Venda registrada.'); }
    closeModal();
    renderView('commercial');
  });
  // resumo dinamico do total (frete + ajudantes)
  const atualizarResumo = () => {
    const frete = Number((overlay.querySelector('[name="valor"]') || {}).value) || 0;
    const qtd = Number((overlay.querySelector('[name="qtd_ajudantes"]') || {}).value) || 0;
    const vAjud = Number((overlay.querySelector('[name="valor_ajudante"]') || {}).value) || 0;
    const qtdEnt = Math.max(1, Number((overlay.querySelector('[name="qtd_entregas"]') || {}).value) || 1);
    const totalAjud = qtd * vAjud;
    const elF = overlay.querySelector('#rv-frete');
    const elA = overlay.querySelector('#rv-ajud');
    const elT = overlay.querySelector('#rv-total');
    const elE = overlay.querySelector('#rv-entrega');
    if (elF) elF.textContent = fmtMoney(frete);
    if (elA) elA.textContent = fmtMoney(totalAjud) + (qtd > 0 ? ` (${qtd}×${fmtMoney(vAjud)})` : '');
    if (elT) elT.textContent = fmtMoney(frete + totalAjud);
    if (elE) elE.textContent = fmtMoney(frete / qtdEnt) + (qtdEnt > 1 ? ` (${qtdEnt} entregas)` : '');
  };
  ['valor', 'qtd_ajudantes', 'valor_ajudante', 'qtd_entregas'].forEach(nome => {
    const el = overlay.querySelector('[name="' + nome + '"]');
    if (el) el.addEventListener('input', atualizarResumo);
  });
  atualizarResumo();
}

function coletarMovimentos(ini, fim) {
  const dentro = (d) => d && d >= ini && d <= fim;
  const entradas = [];
  const saidas = [];
  Store.list('finance').filter(l => l.tipo === 'receita' && l.pago === 'sim' && dentro(l.data)).forEach(l => {
    entradas.push({ data: l.data, valor: Number(l.valor), categoria: l.categoria || 'Outros' });
  });
  Store.list('sales').filter(s => s.status === 'fechado' || s.status === 'concluido').forEach(s => {
    getParcelas(s).filter(p => p.pago === 'sim' && dentro(p.data)).forEach(p => {
      entradas.push({ data: p.data, valor: Number(p.valor), categoria: 'Frete' });
    });
  });
  Store.list('finance').filter(l => l.tipo === 'despesa' && l.pago === 'sim' && dentro(l.data)).forEach(l => {
    saidas.push({ data: l.data, valor: Number(l.valor), categoria: l.categoria || 'Outros' });
  });
  Store.list('fuel').filter(f => f.pago === 'sim' && dentro(f.data)).forEach(f => {
    saidas.push({ data: f.data, valor: Number(f.valor_total), categoria: 'Combustivel' });
  });
  Store.list('maintenance').filter(m => m.pago === 'sim' && Number(m.custo) > 0 && dentro(m.data)).forEach(m => {
    saidas.push({ data: m.data, valor: Number(m.custo), categoria: 'Manutencao' });
  });
  return { entradas: entradas, saidas: saidas };
}

const analisePeriodo = { ini: null, fim: null };

function renderAnaliseFinanceira() {
  if (!analisePeriodo.ini) {
    const h = new Date();
    analisePeriodo.ini = new Date(h.getFullYear(), h.getMonth() - 5, 1).toISOString().slice(0, 10);
    analisePeriodo.fim = todayISO();
  }
  const ini = analisePeriodo.ini;
  const fim = analisePeriodo.fim;
  const mov = coletarMovimentos(ini, fim);
  const entradas = mov.entradas;
  const saidas = mov.saidas;

  const totalEnt = entradas.reduce((s, m) => s + m.valor, 0);
  const totalSai = saidas.reduce((s, m) => s + m.valor, 0);
  const saldo = totalEnt - totalSai;

  const meses = {};
  entradas.forEach(e => {
    const mk = e.data.slice(0, 7);
    if (!meses[mk]) meses[mk] = { ent: 0, sai: 0 };
    meses[mk].ent += e.valor;
  });
  saidas.forEach(e => {
    const mk = e.data.slice(0, 7);
    if (!meses[mk]) meses[mk] = { ent: 0, sai: 0 };
    meses[mk].sai += e.valor;
  });
  const mesesOrd = Object.keys(meses).sort();

  const catSai = {};
  saidas.forEach(s => { catSai[s.categoria] = (catSai[s.categoria] || 0) + s.valor; });
  const catsOrd = Object.entries(catSai).sort((a, b) => b[1] - a[1]);

  const catEnt = {};
  entradas.forEach(e => { catEnt[e.categoria] = (catEnt[e.categoria] || 0) + e.valor; });
  const catsEntOrd = Object.entries(catEnt).sort((a, b) => b[1] - a[1]);

  let maxVal = 1;
  mesesOrd.forEach(m => { maxVal = Math.max(maxVal, meses[m].ent, meses[m].sai); });
  const bw = 46;
  const gap = 34;
  const padL = 8;
  const chartH = 200;
  const chartW = Math.max(320, padL * 2 + mesesOrd.length * (bw + gap));
  const nomesMes = ['jan', 'fev', 'mar', 'abr', 'mai', 'jun', 'jul', 'ago', 'set', 'out', 'nov', 'dez'];
  let barsSvg = '';
  for (let i = 0; i < mesesOrd.length; i++) {
    const m = mesesOrd[i];
    const x = padL + i * (bw + gap);
    const hEnt = Math.round((meses[m].ent / maxVal) * chartH);
    const hSai = Math.round((meses[m].sai / maxVal) * chartH);
    const yy = m.slice(2, 4);
    const mm = m.slice(5, 7);
    const nomeMes = nomesMes[Number(mm) - 1];
    const yEnt = 20 + chartH - hEnt;
    const ySai = 20 + chartH - hSai;
    const xSai = x + bw / 2 + 2;
    const wBar = bw / 2 - 2;
    const xLbl = x + bw / 2;
    const yLbl = 20 + chartH + 16;
    barsSvg += '<rect x="' + x + '" y="' + yEnt + '" width="' + wBar + '" height="' + hEnt + '" rx="3" fill="#3E9B5C"><title>' + nomeMes + '/' + yy + ' Recebido ' + fmtMoney(meses[m].ent) + '</title></rect>';
    barsSvg += '<rect x="' + xSai + '" y="' + ySai + '" width="' + wBar + '" height="' + hSai + '" rx="3" fill="#C1432E"><title>' + nomeMes + '/' + yy + ' Pago ' + fmtMoney(meses[m].sai) + '</title></rect>';
    barsSvg += '<text x="' + xLbl + '" y="' + yLbl + '" text-anchor="middle" font-size="11" fill="#6B747B">' + nomeMes + '/' + yy + '</text>';
  }
  const yBase = 20 + chartH;
  const eixo = '<line x1="' + padL + '" y1="' + yBase + '" x2="' + (chartW - padL) + '" y2="' + yBase + '" stroke="#E3E6E8"/>';
  let barsChart;
  if (mesesOrd.length) {
    barsChart = '<svg viewBox="0 0 ' + chartW + ' ' + (chartH + 50) + '" style="width:100%;max-width:' + chartW + 'px;height:auto;">' + eixo + barsSvg + '</svg>';
  } else {
    barsChart = '<div class="empty-state">Sem movimentos no período.</div>';
  }

  let maxCat = 1;
  catsOrd.forEach(c => { maxCat = Math.max(maxCat, c[1]); });
  let catRows = '';
  catsOrd.forEach(entry => {
    const cat = entry[0];
    const val = entry[1];
    const pct = totalSai > 0 ? Math.round(val / totalSai * 100) : 0;
    const w = Math.round(val / maxCat * 100);
    catRows += '<div style="margin-bottom:10px;"><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:3px;"><span>' + cat + '</span><strong>' + fmtMoney(val) + ' <span style="color:#8A929A;font-weight:400;">(' + pct + '%)</span></strong></div><div style="background:#EEF0F1;border-radius:4px;height:10px;overflow:hidden;"><div style="width:' + w + '%;height:100%;background:#C1432E;"></div></div></div>';
  });
  if (!catRows) catRows = '<div class="empty-state">Sem despesas pagas no período.</div>';

  let maxCatEnt = 1;
  catsEntOrd.forEach(c => { maxCatEnt = Math.max(maxCatEnt, c[1]); });
  let catEntRows = '';
  catsEntOrd.forEach(entry => {
    const cat = entry[0];
    const val = entry[1];
    const pct = totalEnt > 0 ? Math.round(val / totalEnt * 100) : 0;
    const w = Math.round(val / maxCatEnt * 100);
    catEntRows += '<div style="margin-bottom:10px;"><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:3px;"><span>' + cat + '</span><strong>' + fmtMoney(val) + ' <span style="color:#8A929A;font-weight:400;">(' + pct + '%)</span></strong></div><div style="background:#EEF0F1;border-radius:4px;height:10px;overflow:hidden;"><div style="width:' + w + '%;height:100%;background:#3E9B5C;"></div></div></div>';
  });
  if (!catEntRows) catEntRows = '<div class="empty-state">Sem recebimentos no período.</div>';

  const margem = totalEnt > 0 ? Math.round(saldo / totalEnt * 100) : 0;
  const corSaldo = saldo >= 0 ? 'var(--verde-ok)' : 'var(--vermelho-alerta)';
  const rotuloSaldo = saldo >= 0 ? 'superavit' : 'deficit';

  let html = '';
  html += '<div class="page-header"><div><h1 class="page-title">Financeiro</h1><div class="page-sub">Análise do que foi pago e recebido no período</div></div></div>';
  html += '<div class="tab-bar">';
  html += '<button class="tab-chip" data-fintab="lancamentos">📒 Lançamentos</button>';
  html += '<button class="tab-chip" data-fintab="fluxo">💰 Fluxo de Caixa</button>';
  html += '<button class="tab-chip active" data-fintab="analise">📊 Análise</button>';
  html += '</div>';
  html += '<div class="card" style="margin-bottom:16px;"><div style="display:flex;gap:14px;align-items:flex-end;flex-wrap:wrap;">';
  html += '<div class="form-field"><label>De</label><input type="date" id="an-ini" value="' + ini + '"></div>';
  html += '<div class="form-field"><label>Ate</label><input type="date" id="an-fim" value="' + fim + '"></div>';
  html += '<button class="btn btn-primary btn-sm" id="an-aplicar" style="height:37px;">Aplicar</button>';
  html += '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-left:auto;">';
  html += '<button class="tab-chip" data-atalho="mes">Este mes</button>';
  html += '<button class="tab-chip" data-atalho="3m">Últimos 3 meses</button>';
  html += '<button class="tab-chip" data-atalho="6m">Últimos 6 meses</button>';
  html += '<button class="tab-chip" data-atalho="ano">Este ano</button>';
  html += '</div></div></div>';
  html += '<div class="grid grid-4" style="margin-bottom:16px;">';
  html += '<div class="card"><p class="card-title">Recebido</p><div class="kpi-value" style="font-size:26px;color:var(--verde-ok);">' + fmtMoney(totalEnt) + '</div><div class="kpi-label">' + entradas.length + ' entrada(s)</div></div>';
  html += '<div class="card"><p class="card-title">Pago</p><div class="kpi-value" style="font-size:26px;color:var(--vermelho-alerta);">' + fmtMoney(totalSai) + '</div><div class="kpi-label">' + saidas.length + ' saida(s)</div></div>';
  html += '<div class="card"><p class="card-title">Resultado</p><div class="kpi-value" style="font-size:26px;color:' + corSaldo + ';">' + fmtMoney(saldo) + '</div><div class="kpi-label">' + rotuloSaldo + ' no periodo</div></div>';
  html += '<div class="card"><p class="card-title">Margem</p><div class="kpi-value" style="font-size:26px;">' + margem + '%</div><div class="kpi-label">resultado / recebido</div></div>';
  html += '</div>';
  html += '<div class="card" style="margin-bottom:16px;"><p class="card-title">Recebido × Pago por mês <span style="font-weight:400;text-transform:none;margin-left:8px;"><span style="color:var(--verde-ok);">[ ]</span> recebido <span style="color:var(--vermelho-alerta);">[ ]</span> pago</span></p>' + barsChart + '</div>';
  html += '<div class="grid grid-2">';
  html += '<div class="card"><p class="card-title">Despesas por categoria</p>' + catRows + '</div>';
  html += '<div class="card"><p class="card-title">Receitas por categoria</p>' + catEntRows + '</div>';
  html += '</div>';
  main.innerHTML = html;

  main.querySelectorAll('[data-fintab]').forEach(btn => btn.addEventListener('click', () => {
    financeTab = btn.dataset.fintab;
    loadBaseData();
    views.finance();
  }));
  document.getElementById('an-aplicar').addEventListener('click', () => {
    const i = document.getElementById('an-ini').value;
    const f = document.getElementById('an-fim').value;
    if (i && f && i <= f) {
      analisePeriodo.ini = i;
      analisePeriodo.fim = f;
      renderAnaliseFinanceira();
    } else {
      toast('Verifique as datas do período.', 'error');
    }
  });
  main.querySelectorAll('[data-atalho]').forEach(btn => btn.addEventListener('click', () => {
    const hoje = new Date();

    const k = btn.dataset.atalho;
